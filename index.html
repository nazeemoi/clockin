// ── Helpers ───────────────────────────────────────────────────────────────────
function haversineM(la1,lo1,la2,lo2){const R=6371000,dLa=((la2-la1)*Math.PI)/180,dLo=((lo2-lo1)*Math.PI)/180,a=Math.sin(dLa/2)**2+Math.cos((la1*Math.PI)/180)*Math.cos((la2*Math.PI)/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function mkId(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function fmtTime(iso){return new Date(iso).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});}
function fmtDate(iso){return new Date(iso).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function fmtDateShort(iso){return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function dur(a,b){if(!a||!b)return null;const ms=new Date(b)-new Date(a),h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return`${h}h ${m}m`;}

function buildPairs(records,filterUserId){
  const byUser={};
  records.filter(r=>!filterUserId||r.userId===filterUserId)
    .sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp))
    .forEach(r=>{(byUser[r.userId]=byUser[r.userId]||[]).push(r);});
  const pairs=[];
  Object.values(byUser).forEach(recs=>{
    let open=null;
    recs.forEach(r=>{
      if(r.type==="in"){if(open)pairs.push({name:open.userName,userId:open.userId,inTime:open.timestamp,outTime:null,onSite:open.onSite});open=r;}
      else if(r.type==="out"&&open){pairs.push({name:open.userName,userId:open.userId,inTime:open.timestamp,outTime:r.timestamp,onSite:open.onSite});open=null;}
    });
    if(open)pairs.push({name:open.userName,userId:open.userId,inTime:open.timestamp,outTime:null,onSite:open.onSite});
  });
  return pairs.sort((a,b)=>new Date(b.inTime)-new Date(a.inTime));
}

function exportCSV(records){
  const pairs=buildPairs(records);
  const hdr="Staff,Date,Clock In,Clock Out,Duration,Status\n";
  const rows=pairs.map(p=>[p.name,fmtDate(p.inTime),fmtTime(p.inTime),p.outTime?fmtTime(p.outTime):"Still In",p.outTime?dur(p.inTime,p.outTime):"",p.onSite===null?"No GPS":p.onSite?"On-Site":"Remote"].join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([hdr+rows],{type:"text/csv"}));a.download=`OceanIslandInn_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

// ── TF.js face engine (BlazeFace + MobileNet, loads once) ────────────────────
const FaceEngine = {
  blazeModel: null,
  mobileModel: null,
  loading: false,
  loaded: false,
  async load(){
    if(this.loaded) return;
    if(this.loading) { await new Promise(r=>{ const t=setInterval(()=>{ if(this.loaded){clearInterval(t);r();} },100); }); return; }
    this.loading = true;
    await tf.setBackend("webgl");
    await tf.ready();
    [this.blazeModel, this.mobileModel] = await Promise.all([
      blazeface.load(),
      mobilenet.load({version:2, alpha:0.5}),
    ]);
    this.loaded = true;
    this.loading = false;
  },
  // Returns Float32Array embedding from a video/canvas, or null if no face found
  async embed(videoEl){
    const preds = await this.blazeModel.estimateFaces(videoEl, false);
    if(!preds.length) return null;
    const p = preds[0];
    const [x1,y1] = p.topLeft;
    const [x2,y2] = p.bottomRight;
    const pad = 20;
    const sx = Math.max(0, x1-pad), sy = Math.max(0, y1-pad);
    const sw = Math.min(videoEl.videoWidth||videoEl.width, x2+pad) - sx;
    const sh = Math.min(videoEl.videoHeight||videoEl.height, y2+pad) - sy;
    // Crop face to offscreen canvas
    const crop = document.createElement("canvas");
    crop.width = 224; crop.height = 224;
    crop.getContext("2d").drawImage(videoEl, sx, sy, sw, sh, 0, 0, 224, 224);
    // Get MobileNet embedding (logit layer before softmax = 1024-d vector)
    // mobileModel.infer(img, true) returns a tensor directly (not {result})
    const embedding = tf.tidy(()=>{
      const img = tf.browser.fromPixels(crop).toFloat().div(127.5).sub(1).expandDims(0);
      return this.mobileModel.infer(img, true).squeeze();
    });
    const vec = await embedding.data();
    embedding.dispose();
    return new Float32Array(vec);
  },
  cosineSim(a, b){
    let dot=0, na=0, nb=0;
    for(let i=0;i<a.length;i++){ dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
    return dot/(Math.sqrt(na)*Math.sqrt(nb));
  },
  match(embedding, enrolledRows, threshold=0.96){
    let best=null, bestScore=-1;
    for(const row of enrolledRows){
      const stored = new Float32Array(row.face_descriptor);
      const score = this.cosineSim(embedding, stored);
      console.log(`[FaceEngine] ${row.name}: score=${score.toFixed(4)}`);
      if(score > bestScore){ bestScore=score; best=row; }
    }
    console.log(`[FaceEngine] Best: ${best?.name} score=${bestScore.toFixed(4)} threshold=${threshold} → ${bestScore>=threshold?'MATCH':'NO MATCH'}`);
    return bestScore >= threshold ? {user:best, score:bestScore} : null;
  },
};

// ── FaceEnrollModal ───────────────────────────────────────────────────────────
function FaceEnrollModal({user, onClose, onEnrolled}){
  const [phase, setPhase] = useState("idle");
  const [msg, setMsg] = useState("");
  const [countdown, setCountdown] = useState(null);
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const embeddingRef = useRef(null);
  const detectedRef = useRef(false);

  const stopCamera = () => {
    if(rafRef.current){ clearTimeout(rafRef.current); cancelAnimationFrame(rafRef.current); }
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    streamRef.current = null;
    detectedRef.current = false;
  };
  useEffect(() => () => stopCamera(), []);

  const startEnroll = async () => {
    setPhase("loading"); setMsg("Loading models...");
    embeddingRef.current = null;
    detectedRef.current = false;
    try {
      await FaceEngine.load();
      setMsg("Starting camera...");
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:640},height:{ideal:480}}});
      streamRef.current = stream;
      const vid = videoRef.current;
      if(!vid){ stopCamera(); return; }
      vid.srcObject = stream;
      await vid.play().catch(()=>{});
      // Wait until video is actually delivering frames (important on iOS Safari)
      await new Promise(resolve => {
        const check = () => {
          if(vid.readyState >= 2 && vid.videoWidth > 0) resolve();
          else requestAnimationFrame(check);
        };
        check();
      });
      setPhase("scanning"); setMsg("Looking for your face...");
      // Poll every 300ms to avoid flooding the GPU
      const scan = async () => {
        if(!videoRef.current || detectedRef.current) return;
        try {
          const emb = await FaceEngine.embed(videoRef.current);
          if(emb){
            detectedRef.current = true;
            embeddingRef.current = emb;
            let c = 3;
            setMsg("Face detected! Capturing in " + c + "..."); setCountdown(c);
            const tick = setInterval(()=>{
              c--;
              if(c > 0){ setCountdown(c); setMsg("Capturing in " + c + "..."); }
              else {
                clearInterval(tick); setCountdown(null);
                stopCamera(); setPhase("captured");
                setMsg("Face captured. Save this enrollment?");
              }
            }, 1000);
            return;
          } else {
            setMsg("Looking for your face... ensure good lighting.");
          }
        } catch(scanErr){ console.warn("scan frame error:", scanErr); }
        rafRef.current = setTimeout(scan, 300);
      };
      scan();
    } catch(err){
      console.error("enroll error:", err); stopCamera(); setPhase("error");
      setMsg(err.name==="NotAllowedError" ? "Camera permission denied." : "Error: " + (err.message || "Something went wrong."));
    }
  };

  const saveEnrollment = async () => {
    if(!embeddingRef.current) return;
    setPhase("saving"); setMsg("Saving…");
    await DB.saveFaceDescriptor(user.id, Array.from(embeddingRef.current));
    setPhase("done"); setMsg(`✅ ${user.name}'s face enrolled.`);
    onEnrolled(user.id);
    setTimeout(()=>onClose(), 1600);
  };

  const retake = () => { embeddingRef.current=null; detectedRef.current=false; setPhase("idle"); setMsg(""); };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",backdropFilter:"blur(6px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"1.5rem"}}>
      <div style={{background:"#fff",borderRadius:24,padding:"2rem",width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.5rem"}}>
          <div><div style={{fontWeight:600,color:C.text,fontSize:"1rem"}}>Enroll Face</div><div style={{color:C.sub,fontSize:"0.78rem",marginTop:"0.15rem"}}>{user.name}</div></div>
          <button onClick={()=>{stopCamera();onClose();}} style={{background:"#f5f5f7",border:"1px solid #e8e8ed",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:"1rem",color:C.sub,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{position:"relative",width:"100%",paddingBottom:"75%",borderRadius:16,overflow:"hidden",background:"#111",marginBottom:"1.2rem",border:`2px solid ${phase==="scanning"?C.green:phase==="captured"?C.blue:"#e8e8ed"}`}}>

// ── FaceLoginButton (login screen) ────────────────────────────────────────────
function FaceLoginButton({users, onSuccess, onFallback}){
  const [phase, setPhase] = useState("idle");
  const [msg, setMsg] = useState("");
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);

  const stopCamera = () => {
    if(rafRef.current){ clearTimeout(rafRef.current); cancelAnimationFrame(rafRef.current); }
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    streamRef.current = null;
  };
  useEffect(() => () => stopCamera(), []);

  const handleStart = async () => {
    setPhase("loading"); setMsg("Loading models…");
    try {
      await FaceEngine.load();
      const rows = await DB.getFaceDescriptors();
      if(!rows.length){ setPhase("idle"); setMsg(""); onFallback(); return; }

      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
      streamRef.current = stream;
      const vid = videoRef.current;
      if(!vid){ stopCamera(); return; }
      vid.srcObject = stream;
      await vid.play().catch(()=>{});
      await new Promise(resolve => {
        const check = () => {
          if(vid.readyState >= 2 && vid.videoWidth > 0) resolve();
          else requestAnimationFrame(check);
        };
        check();
      });

      await vid.play().catch(()=>{});
      await new Promise(resolve => {
        const check = () => {
          if(vid.readyState >= 2 && vid.videoWidth > 0) resolve();
          else requestAnimationFrame(check);
        };
        check();
      });
      setPhase("scanning"); setMsg("Hold still - scanning...");
      const scan = async () => {
        if(!videoRef.current) return;
        try {
          const emb = await FaceEngine.embed(videoRef.current);
          if(emb){
            const result = FaceEngine.match(emb, rows);
            if(result){
              stopCamera();
              const u = users.find(x=>x.id===result.user.id);
              if(u){
                setPhase("matched"); setMsg("Welcome, " + u.name + "!");
                setTimeout(()=>{ setPhase("idle"); setMsg(""); onSuccess(u); }, 1200);
                return;
              }
            }
          }
        } catch(e){ console.warn("login scan error:", e); }
        rafRef.current = setTimeout(scan, 300);
      };
      scan();
    } catch(err){
      console.error(err); stopCamera();
      setPhase("failed"); setMsg("Face scan unavailable. Falling back to kiosk…");
      setTimeout(()=>{ setPhase("idle"); setMsg(""); onFallback(); }, 1800);
    }
  };

  const handleCancel = () => { stopCamera(); setPhase("idle"); setMsg(""); };

  if(phase==="scanning"||phase==="loading") return (
    <div style={{width:"100%",textAlign:"center"}}>
      <div style={{position:"relative",width:220,height:165,margin:"0 auto 0.6rem",borderRadius:16,overflow:"hidden",background:"#111",border:`2px solid ${phase==="scanning"?C.green:C.blue}`}}>
        <video ref={videoRef} autoPlay muted playsInline style={{width:"100%",height:"100%",objectFit:"cover",transform:"scaleX(-1)"}}/>
        {phase==="loading"&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"0.8rem"}}>Loading…</div>}
        <div style={{position:"absolute",top:8,left:8,right:8,bottom:8,border:"2px solid rgba(255,255,255,0.3)",borderRadius:10,pointerEvents:"none"}}/>
      </div>
      <p style={{color:C.sub,fontSize:"0.78rem",marginBottom:"0.5rem"}}>{msg}</p>
      <button onClick={handleCancel} style={{...btnGhost,fontSize:"0.75rem"}}>Cancel</button>
    </div>
  );
  if(phase==="matched") return <div style={{textAlign:"center",padding:"0.4rem 0"}}><p style={{color:C.greenText,fontWeight:600,fontSize:"0.9rem"}}>{msg}</p></div>;
  if(phase==="failed") return <div style={{textAlign:"center",padding:"0.4rem 0"}}><p style={{color:C.warn,fontSize:"0.8rem"}}>{msg}</p></div>;

  return (
    <button onClick={handleStart} style={{background:"#f5f5f7",border:"1px solid #e8e8ed",borderRadius:980,color:C.text,fontSize:"0.82rem",fontWeight:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"inline-flex",alignItems:"center",gap:"0.4rem",padding:"0.45rem 1rem",width:"100%",justifyContent:"center"}}>
      <span style={{fontSize:"1rem"}}>👤</span> Sign in with Face
    </button>
  );
}

// ── FaceKioskScan (kiosk banner) ──────────────────────────────────────────────
function FaceKioskScan({users, records, onClock, onFallback}){
  const [phase, setPhase] = useState("idle");
  const [msg, setMsg] = useState("");
  const [confirmed, setConfirmed] = useState(null);
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);

  const isClockedIn = (userId) => {
    const recs = [...records].filter(r=>r.userId===userId).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    return recs.length>0&&recs[0].type==="in";
  };
  const stopCamera = () => {
    if(rafRef.current){ clearTimeout(rafRef.current); cancelAnimationFrame(rafRef.current); }
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    streamRef.current = null;
  };
  useEffect(() => () => stopCamera(), []);

  const handleStart = async () => {
    setPhase("loading"); setMsg("Loading…");
    try {
      await FaceEngine.load();
      const rows = await DB.getFaceDescriptors();
      if(!rows.length){ setPhase("idle"); onFallback(); return; }

      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
      streamRef.current = stream;
      const stream_vid = videoRef.current;
      if(!stream_vid){ stopCamera(); return; }
      stream_vid.srcObject = stream;

      await stream_vid.play().catch(()=>{});
      await new Promise(resolve => {
        const check = () => {
          if(stream_vid.readyState >= 2 && stream_vid.videoWidth > 0) resolve();
          else requestAnimationFrame(check);
        };
        check();
      });
      setPhase("scanning"); setMsg("Look at the camera...");
      const scan = async () => {
        if(!videoRef.current) return;
        try {
          const emb = await FaceEngine.embed(videoRef.current);
          if(emb){
            const result = FaceEngine.match(emb, rows);
            if(result){
              stopCamera();
              const u = users.find(x=>x.id===result.user.id);
              if(u){
                const type = isClockedIn(u.id) ? "out" : "in";
                onClock(u.id, u.name, type);
                setConfirmed({name:u.name, type});
                setPhase("confirmed");
                setTimeout(()=>{ setPhase("idle"); setConfirmed(null); }, 2500);
                return;
              }
            }
          }
        } catch(e){ console.warn("kiosk scan error:", e); }
        rafRef.current = setTimeout(scan, 300);
      };
      scan();
    } catch(err){
      console.error(err); stopCamera(); setPhase("idle");
    }
  };

  if(phase==="confirmed"&&confirmed){
    const isIn = confirmed.type==="in";
    return (
      <div style={{background:isIn?"rgba(40,205,65,0.08)":"rgba(255,59,48,0.06)",border:`1px solid ${isIn?"rgba(40,205,65,0.3)":"rgba(255,59,48,0.2)"}`,borderRadius:14,padding:"0.85rem 1.1rem",margin:"0.75rem 0.75rem 0",display:"flex",alignItems:"center",gap:"0.75rem"}}>
        <span style={{fontSize:"1.6rem"}}>{isIn?"✅":"👋"}</span>
        <div>
          <p style={{color:isIn?C.greenText:C.red,fontWeight:600,fontSize:"0.92rem",margin:0}}>{confirmed.name}</p>
          <p style={{color:isIn?C.greenText:C.red,fontSize:"0.78rem",margin:0}}>{isIn?"Clocked In":"Clocked Out"} · {new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</p>
        </div>
      </div>
    );
  }
  if(phase==="scanning"||phase==="loading") return (
    <div style={{display:"flex",alignItems:"center",gap:"1rem",background:"#fff",border:`1px solid ${C.green}`,borderRadius:14,padding:"0.65rem 1rem",margin:"0.75rem 0.75rem 0"}}>
      <div style={{position:"relative",width:88,height:66,borderRadius:10,overflow:"hidden",background:"#111",flexShrink:0,border:`1px solid ${C.green}`}}>
        <video ref={videoRef} autoPlay muted playsInline style={{width:"100%",height:"100%",objectFit:"cover",transform:"scaleX(-1)"}}/>
        {phase==="loading"&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"0.65rem"}}>Loading…</div>}
      </div>
      <div style={{flex:1}}>
        <p style={{color:C.greenText,fontWeight:600,fontSize:"0.82rem",margin:"0 0 0.15rem"}}>Face Scan Active</p>
        <p style={{color:C.sub,fontSize:"0.73rem",margin:0}}>{msg}</p>
      </div>
      <button onClick={()=>{stopCamera();setPhase("idle");}} style={{...btnGhost,fontSize:"0.73rem",flexShrink:0,padding:"0.3rem 0.65rem"}}>Cancel</button>
    </div>
  );
  return (
    <div style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:14,padding:"0.65rem 1rem",margin:"0.75rem 0.75rem 0",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"1rem"}}>
      <div>
        <p style={{color:C.text,fontWeight:600,fontSize:"0.82rem",margin:"0 0 0.12rem"}}>👤 Face Clock-In / Out</p>
        <p style={{color:C.sub,fontSize:"0.73rem",margin:0}}>Look at the camera to clock in automatically</p>
      </div>
      <button onClick={handleStart} style={{...btnPrimary,padding:"0.45rem 1rem",fontSize:"0.8rem",flexShrink:0}}>Start Scan</button>
    </div>
  );
}

// ── Journal swipe card ────────────────────────────────────────────────────────
function JournalCard({entry,onRead}){
  const cardRef=useRef(null);
  const startX=useRef(null);
  const[dx,setDx]=useState(0);
  const[dismissing,setDismissing]=useState(false);

  const onPointerDown=(e)=>{startX.current=e.clientX;cardRef.current?.setPointerCapture(e.pointerId);};
  const onPointerMove=(e)=>{if(startX.current===null)return;const d=e.clientX-startX.current;if(d>0)setDx(d);};
  const onPointerUp=()=>{
    if(dx>100){setDismissing(true);setTimeout(()=>{onRead(entry.id);setDx(0);setDismissing(false);},320);}
    else setDx(0);
    startX.current=null;
  };

  const progress=Math.min(dx/130,1);
  const tx=dismissing?440:dx;
  const opacity=dismissing?0:1;

  return(
    <div ref={cardRef} onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={()=>{setDx(0);startX.current=null;}}
      style={{position:"absolute",top:0,left:0,right:0,background:"#fff",borderRadius:20,border:"1px solid #e8e8ed",
        boxShadow:"0 4px 28px rgba(0,0,0,0.09)",padding:"1.5rem 1.6rem 1.3rem",
        transform:`translateX(${tx}px) rotate(${progress*6}deg)`,opacity,
        transition:dx===0||dismissing?"transform 0.32s cubic-bezier(.22,.68,0,1.2), opacity 0.28s ease":"none",
        cursor:"grab",userSelect:"none",touchAction:"pan-y"}}>
      <p style={{color:C.text,fontSize:"0.95rem",lineHeight:1.65,margin:"0 0 1rem"}}>{entry.body}</p>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"0.5rem"}}>
        <span style={{color:C.muted,fontSize:"0.72rem"}}>by {entry.authorName} · {fmtDateShort(entry.createdAt)}</span>
        <span style={{display:"flex",alignItems:"center",gap:"0.3rem",color:dx>40?C.greenText:C.muted,fontSize:"0.72rem",fontWeight:500,transition:"color 0.15s",whiteSpace:"nowrap"}}>
          <span>→</span> Swipe to mark read
        </span>
      </div>
    </div>
  );
}

// ── GroupedRecords ────────────────────────────────────────────────────────────
function GroupedRecords({pairs,showBadge=false}){
  const[openY,setOpenY]=useState({});
  const[openM,setOpenM]=useState({});
  const[openW,setOpenW]=useState({});
  if(!pairs.length)return <div style={{...cardStyle,padding:"3rem",textAlign:"center",color:C.muted,fontSize:"0.88rem"}}>No shifts recorded yet.</div>;

  function wkStart(d){const m=new Date(d);m.setDate(d.getDate()-((d.getDay()+6)%7));m.setHours(0,0,0,0);return m;}
  function wkKey(d){return wkStart(d).toISOString().slice(0,10);}
  function wkLabel(d){const m=wkStart(d),e=new Date(m);e.setDate(m.getDate()+6);return`Week of ${m.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${e.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;}
  function mKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;}
  function mLabel(d){return d.toLocaleDateString("en-US",{month:"long",year:"numeric"});}

  const tree={};
  pairs.forEach(p=>{
    const d=new Date(p.inTime),y=d.getFullYear(),mk=mKey(d),wk=wkKey(d);
    if(!tree[y])tree[y]={};
    if(!tree[y][mk])tree[y][mk]={label:mLabel(d),weeks:{}};
    if(!tree[y][mk].weeks[wk])tree[y][mk].weeks[wk]={label:wkLabel(d),pairs:[]};
    tree[y][mk].weeks[wk].pairs.push(p);
  });

  const years=Object.keys(tree).sort((a,b)=>b-a);
  const isYOpen=y=>openY[y]===undefined?parseInt(y)===new Date().getFullYear():openY[y];
  const isMOpen=k=>openM[k]===undefined?true:openM[k];
  const isWOpen=k=>openW[k]===undefined?true:openW[k];
  const totalMs=ps=>{let ms=0;ps.forEach(p=>{if(p.outTime)ms+=new Date(p.outTime)-new Date(p.inTime);});if(!ms)return null;return`${Math.floor(ms/3600000)}h ${Math.floor((ms%3600000)/60000)}m`;};
  const pill=n=><span style={{background:"#e8f0fe",border:"1px solid #c5d5f5",borderRadius:20,padding:"0.12rem 0.48rem",fontSize:"0.67rem",color:C.blue,marginLeft:"0.4rem"}}>{n} shift{n!==1?"s":""}</span>;
  const chev=o=><span style={{display:"inline-block",transform:o?"rotate(90deg)":"none",transition:"transform 0.18s",marginRight:"0.4rem",color:C.muted,fontSize:"0.72rem"}}>▶</span>;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
      {years.map(y=>{
        const yo=isYOpen(y);
        const yp=Object.values(tree[y]).flatMap(m=>Object.values(m.weeks).flatMap(w=>w.pairs));
        return(
          <div key={y} style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:16,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
            <div onClick={()=>setOpenY(s=>({...s,[y]:!isYOpen(y)}))} style={{display:"flex",alignItems:"center",padding:"0.9rem 1.3rem",cursor:"pointer",background:"#f5f5f7",borderBottom:yo?"1px solid #e8e8ed":"none"}}>
              {chev(yo)}<span style={{fontWeight:600,color:C.text}}>{y}</span>{pill(yp.length)}
              {totalMs(yp)&&<span style={{marginLeft:"auto",color:C.sub,fontSize:"0.76rem"}}>{totalMs(yp)} total</span>}
            </div>
            {yo&&Object.keys(tree[y]).sort((a,b)=>b.localeCompare(a)).map(mk=>{
              const mo=tree[y][mk],mop=isMOpen(mk);
              const mp=Object.values(mo.weeks).flatMap(w=>w.pairs);
              return(
                <div key={mk} style={{borderBottom:"1px solid #f0f0f5"}}>
                  <div onClick={()=>setOpenM(s=>({...s,[mk]:!isMOpen(mk)}))} style={{display:"flex",alignItems:"center",padding:"0.7rem 1.3rem 0.7rem 2rem",cursor:"pointer",background:"#fafafa"}}>
                    {chev(mop)}<span style={{fontWeight:500,color:C.text,fontSize:"0.9rem"}}>{mo.label}</span>{pill(mp.length)}
                    {totalMs(mp)&&<span style={{marginLeft:"auto",color:C.sub,fontSize:"0.74rem"}}>{totalMs(mp)}</span>}
                  </div>
                  {mop&&Object.keys(mo.weeks).sort((a,b)=>b.localeCompare(a)).map(wk=>{
                    const we=mo.weeks[wk],wop=isWOpen(wk);
                    return(
                      <div key={wk}>
                        <div onClick={()=>setOpenW(s=>({...s,[wk]:!isWOpen(wk)}))} style={{display:"flex",alignItems:"center",padding:"0.55rem 1.3rem 0.55rem 3rem",cursor:"pointer",borderTop:"1px solid #f5f5f7"}}>
                          {chev(wop)}<span style={{color:C.sub,fontSize:"0.82rem"}}>{we.label}</span>{pill(we.pairs.length)}
                          {totalMs(we.pairs)&&<span style={{marginLeft:"auto",color:C.muted,fontSize:"0.72rem"}}>{totalMs(we.pairs)}</span>}
                        </div>
                        {wop&&<ShiftTable pairs={we.pairs} showName={showBadge} showBadge={showBadge}/>}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

}

// ── UserManagement ────────────────────────────────────────────────────────────
function UserManagement({users, onAdd, onDelete, onUpdate}){
  const blank={name:"",username:"",password:"",role:"staff",departments:[],pin:""};
  const[form,setForm]=useState(blank);
  const[err,setErr]=useState("");
  const[ok,setOk]=useState("");
  const[confirm,setConfirm]=useState(null);
  const[editing,setEditing]=useState(null);
  const[enrollTarget,setEnrollTarget]=useState(null);
  // Track which users have face enrolled (from Supabase data, passed via users prop)
  // We'll use a local set updated on enroll/clear
  const[enrolledIds,setEnrolledIds]=useState(new Set(
    users.filter(u=>u.face_descriptor).map(u=>u.id)
  ));

  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const toggleDept=d=>set("departments",form.departments.includes(d)?form.departments.filter(x=>x!==d):[...form.departments,d]);

  const handleAdd=()=>{
    setErr("");setOk("");
    if(!form.name.trim()||!form.username.trim()||!form.password.trim()){setErr("Name, username and password are required.");return;}
    if(users.find(u=>u.username.toLowerCase()===form.username.toLowerCase())){setErr("Username already exists.");return;}
    onAdd({id:mkId(),name:form.name.trim(),username:form.username.trim().toLowerCase(),password:form.password,role:form.role,departments:form.departments});
    setForm(blank);setOk("User created.");setTimeout(()=>setOk(""),3000);
  };

  const handleClearFace = async (userId) => {
    await DB.clearFaceDescriptor(userId);
    setEnrolledIds(s=>{ const n=new Set(s); n.delete(userId); return n; });
  };

  const iSt=inp({marginTop:0});
  const lSt={...lbl,marginTop:0,marginBottom:"0.3rem"};

  return(
    <div>
      {enrollTarget&&(
        <FaceEnrollModal
          user={enrollTarget}
          onClose={()=>setEnrollTarget(null)}
          onEnrolled={(id)=>{
            setEnrolledIds(s=>new Set([...s,id]));
            setEnrollTarget(null);
          }}
        />
      )}

      <div style={secH}>Staff Accounts</div>
      <div style={{...cardStyle,marginBottom:"2rem"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>
              <th style={TH}>Name</th>
              <th style={TH}>Username</th>
              <th style={TH}>Role</th>
              <th style={TH}>PIN</th>
              <th style={TH}>Face ID</th>
              <th style={TH}>Departments</th>
              <th style={TH}>Action</th>
            </tr></thead>
            <tbody>{users.map(u=>(
              <tr key={u.id} style={{background:"#fff"}}>
                <td style={{...TD,fontWeight:500}}>
                  {u.role==="admin"?u.name:<NameEditor name={u.name} onSave={name=>onUpdate(u.id,{name})}/>}
                </td>
                <td style={{...TD,color:C.blue,fontFamily:"monospace",fontSize:"0.82rem"}}>{u.username}</td>
                <td style={TD}><RoleBadge role={u.role}/></td>
                <td style={TD}>
                  {u.role==="admin"?<span style={{color:C.muted,fontSize:"0.75rem"}}>—</span>:(
                    <PinEditor userId={u.id} currentPin={u.pin||""} onSave={(pin)=>onUpdate(u.id,{pin})}/>
                  )}
                </td>
                {/* Face ID column */}
                <td style={TD}>
                  {u.role==="admin"?(
                    <span style={{color:C.muted,fontSize:"0.75rem"}}>—</span>
                  ):enrolledIds.has(u.id)?(
                    <div style={{display:"flex",alignItems:"center",gap:"0.4rem",flexWrap:"wrap"}}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:"0.25rem",background:"rgba(40,205,65,0.08)",border:"1px solid rgba(40,205,65,0.28)",borderRadius:20,padding:"0.15rem 0.55rem",fontSize:"0.67rem",fontWeight:700,color:C.greenText}}>
                        ✓ Enrolled
                      </span>
                      <button onClick={()=>setEnrollTarget(u)} style={{background:"none",border:"none",color:C.blue,fontSize:"0.7rem",cursor:"pointer",padding:0}}>Re-enroll</button>
                      <button onClick={()=>handleClearFace(u.id)} style={{background:"none",border:"none",color:C.red,fontSize:"0.7rem",cursor:"pointer",padding:0}}>Clear</button>
                    </div>
                  ):(
                    <button onClick={()=>setEnrollTarget(u)}
                      style={{background:"#f5f5f7",border:"1px solid #e8e8ed",borderRadius:980,color:C.text,padding:"0.22rem 0.65rem",fontSize:"0.72rem",fontWeight:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"inline-flex",alignItems:"center",gap:"0.3rem"}}>
                      <span>👤</span> Enroll Face
                    </button>

                </td>
                <td style={TD}>
                  {editing===u.id?(
                    <div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:"0.3rem",marginBottom:"0.5rem"}}>
                        {DEPARTMENTS.map(d=>{
                          const active=(u.departments||[]).includes(d);
                          return <button key={d} onClick={()=>onUpdate(u.id,{departments:active?(u.departments||[]).filter(x=>x!==d):[...(u.departments||[]),d]})}
                            style={{fontSize:"0.65rem",fontWeight:600,padding:"0.2rem 0.55rem",borderRadius:20,cursor:"pointer",border:"1px solid",
                              ...(active?{background:"#e8f0fe",color:"#1a56db",borderColor:"#c5d5f5"}:{background:"#f5f5f7",color:C.muted,borderColor:"#e8e8ed"})}}>
                            {d}

                        })}
                      </div>
                      <button style={{...btnGhost,fontSize:"0.72rem",padding:"0.2rem 0.6rem"}} onClick={()=>setEditing(null)}>Done</button>
                    </div>
                  ):(
                    <div style={{display:"flex",flexWrap:"wrap",gap:"0.3rem",alignItems:"center"}}>
                      {(u.departments||[]).length===0?<span style={{color:C.muted,fontSize:"0.78rem"}}>—</span>:(u.departments||[]).map(d=><DeptPill key={d} dept={d}/>)}

                </td>
                <td style={TD}>

                          <span style={{color:C.warn,fontSize:"0.78rem"}}>Delete?</span>
                          <button style={{...btnDanger,padding:"0.2rem 0.55rem",fontSize:"0.72rem"}} onClick={()=>{onDelete(u.id);setConfirm(null);}}>Yes</button>
                          <button style={{...btnGhost,padding:"0.2rem 0.55rem",fontSize:"0.72rem"}} onClick={()=>setConfirm(null)}>No</button>
                        </span>
                      :<button style={btnDanger} onClick={()=>setConfirm(u.id)}>Delete</button>
                  }
                </td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>

      <div style={secH}>Add New User</div>
      <div style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:20,padding:"1.8rem",boxShadow:"0 1px 8px rgba(0,0,0,0.04)"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(165px,1fr))",gap:"1rem",marginBottom:"1rem"}}>
          {[{k:"name",pl:"Jane Smith",lb:"Full Name"},{k:"username",pl:"jsmith",lb:"Username"},{k:"password",pl:"••••••••",lb:"Password",t:"password"},{k:"pin",pl:"0000",lb:"Kiosk PIN",t:"text",max:4}].map(({k,pl,lb,t,max})=>(
            <div key={k}><label style={lSt}>{lb}</label><input style={iSt} type={t||"text"} placeholder={pl} maxLength={max} value={form[k]} onChange={e=>set(k,k==="pin"?e.target.value.replace(/\D/g,"").slice(0,4):e.target.value)}/></div>
          ))}
          <div><label style={lSt}>Role</label>
            <select style={inp()} value={form.role} onChange={e=>set("role",e.target.value)}>
              <option value="staff">Staff</option><option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <div style={{marginBottom:"1rem"}}>
          <label style={lSt}>Departments</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",marginTop:"0.45rem"}}>
            {DEPARTMENTS.map(d=>(
              <button key={d} onClick={()=>toggleDept(d)} style={{fontSize:"0.72rem",fontWeight:600,padding:"0.26rem 0.7rem",borderRadius:20,cursor:"pointer",border:"1px solid",
                ...(form.departments.includes(d)?{background:"#e8f0fe",color:"#1a56db",borderColor:"#c5d5f5"}:{background:"#f5f5f7",color:C.muted,borderColor:"#e8e8ed"})}}>
                {d}
              </button>
            ))}
          </div>
        </div>
        {err&&<p style={{color:C.red,fontSize:"0.8rem",marginBottom:"0.5rem"}}>{err}</p>}
        {ok&&<p style={{color:C.green,fontSize:"0.8rem",marginBottom:"0.5rem"}}>{ok}</p>}
        <button style={btnPrimary} onClick={handleAdd}>Create User</button>

    </div>
  );
}

// ── JournalAdmin ──────────────────────────────────────────────────────────────
function JournalAdmin({entries,onAdd,onDelete,currentUser}){

  const[err,setErr]=useState("");
  const tog=d=>setDepts(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);
  const handlePost=()=>{
    if(!body.trim()){setErr("Message is required.");return;}
    if(!depts.length){setErr("Select at least one department.");return;}
    onAdd({id:mkId(),body:body.trim(),departments:depts,authorName:currentUser.name,createdAt:new Date().toISOString()});

  return(
    <div>
      <div style={secH}>Post a Message</div>

        <label style={{...lbl,marginTop:0}}>Message</label>
        <textarea style={{...inp(),minHeight:88,resize:"vertical",lineHeight:1.6}} placeholder="Write your message here…" value={body} onChange={e=>setBody(e.target.value)}/>

            <button key={d} onClick={()=>tog(d)} style={{fontSize:"0.72rem",fontWeight:600,padding:"0.28rem 0.75rem",borderRadius:20,cursor:"pointer",border:"1px solid",
              ...(depts.includes(d)?{background:"#e8f0fe",color:"#1a56db",borderColor:"#c5d5f5"}:{background:"#f5f5f7",color:C.muted,borderColor:"#e8e8ed"})}}>
              {d}

          ))}
        </div>
        {err&&<p style={{color:C.red,fontSize:"0.8rem",marginBottom:"0.75rem"}}>{err}</p>}

      <div style={secH}>Posted Messages</div>

        <div key={e.id} style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:16,padding:"1.2rem 1.4rem",marginBottom:"0.7rem",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"0.75rem",marginBottom:"0.5rem"}}>

          </div>
          <p style={{color:C.text,fontSize:"0.88rem",lineHeight:1.6,margin:"0.4rem 0 0.7rem"}}>{e.body}</p>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{color:C.muted,fontSize:"0.72rem"}}>by {e.authorName}</span>
            <button style={{...btnDanger,fontSize:"0.72rem",padding:"0.2rem 0.6rem"}} onClick={()=>onDelete(e.id)}>Delete</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── StaffView ─────────────────────────────────────────────────────────────────
function StaffView({user,records,onClock,innCoords,journalEntries,readEntries,onRead}){
  const[locMsg,setLocMsg]=useState(null);
  const[locColor,setLocColor]=useState(C.sub);
  const[showPast,setShowPast]=useState(false);
  const userRecs=[...records].filter(r=>r.userId===user.id).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  const isClockedIn=userRecs.length>0&&userRecs[0].type==="in";
  const allPairs=buildPairs(records,user.id);
  const todayPairs=allPairs.filter(p=>new Date(p.inTime).toDateString()===new Date().toDateString());
  const myDepts=user.departments||[];
  const myEntries=journalEntries.filter(e=>e.departments.some(d=>myDepts.includes(d))&&!readEntries.includes(e.id));
  const pastEntries=journalEntries.filter(e=>e.departments.some(d=>myDepts.includes(d))&&readEntries.includes(e.id));

  const handleClock=async(type)=>{
    setLocMsg("📡 Getting location…");setLocColor(C.sub);
    const doRec=(coords,onSite)=>onClock(type,coords,onSite);
    if(!navigator.geolocation){doRec(null,null);return;}
    navigator.geolocation.getCurrentPosition(pos=>{
      const loc={lat:pos.coords.latitude,lng:pos.coords.longitude};
      const dist=haversineM(loc.lat,loc.lng,innCoords.lat,innCoords.lng);
      const onSite=dist<=RADIUS_M;
      setLocMsg(onSite?`📍 On-site (${Math.round(dist)}m)`:`⚠️ Off-site (${Math.round(dist)}m from hotel)`);
      setLocColor(onSite?C.greenText:C.warn);
      doRec(loc,onSite);
    },()=>{setLocMsg(null);doRec(null,null);},{enableHighAccuracy:true,timeout:10000});
  };

  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"2rem 1.5rem 5rem"}}>
      <div style={{...cardStyle,padding:"2.5rem 2rem 2rem",marginBottom:"1.5rem",textAlign:"center",overflow:"visible"}}>
        <div style={{marginBottom:"0.8rem"}}>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"1.55rem",fontWeight:400,color:C.text,letterSpacing:"0.02em",lineHeight:1.15}}>Ocean Island Inn</div>
          <div style={{color:C.muted,fontSize:"0.7rem",letterSpacing:"0.1em",textTransform:"uppercase",marginTop:"0.2rem"}}>Victoria, BC</div>
        </div>
        <LiveClock/>
        <div style={{color:C.sub,fontSize:"0.82rem",marginTop:"0.3rem",marginBottom:"1.4rem"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
        <div style={{display:"inline-flex",alignItems:"center",gap:"0.45rem",padding:"0.35rem 0.9rem",borderRadius:20,fontSize:"0.78rem",fontWeight:500,marginBottom:"1.4rem",
          ...(isClockedIn?{background:"rgba(40,205,65,0.1)",border:"1px solid rgba(40,205,65,0.28)",color:C.greenText}:{background:"#f5f5f7",border:"1px solid #e8e8ed",color:C.sub})}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:isClockedIn?C.green:"#a1a1a6"}}></span>
          {isClockedIn?"Clocked In":"Not Clocked In"}
        </div>
        <div style={{display:"flex",gap:"0.75rem",justifyContent:"center",flexWrap:"wrap"}}>
          {[{label:"Clock In",active:!isClockedIn,type:"in",bg:C.green},{label:"Clock Out",active:isClockedIn,type:"out",bg:C.red}].map(b=>(
            <button key={b.type} disabled={!b.active} onClick={()=>handleClock(b.type)}
              style={{background:b.bg,border:"none",borderRadius:980,color:"#fff",padding:"0.82rem 2.2rem",fontFamily:"'DM Sans',sans-serif",fontSize:"0.95rem",fontWeight:500,cursor:b.active?"pointer":"not-allowed",opacity:b.active?1:0.28}}>
              {b.label}
            </button>
          ))}
        </div>
        {locMsg&&<p style={{fontSize:"0.75rem",color:locColor,marginTop:"0.8rem"}}>{locMsg}</p>}
      </div>

      {myEntries.length>0&&<JournalStack entries={myEntries} onRead={onRead}/>}

      {pastEntries.length>0&&(
        <div style={{marginBottom:"1.5rem"}}>
          <button onClick={()=>setShowPast(s=>!s)} style={{...btnGhost,display:"flex",alignItems:"center",gap:"0.4rem",marginBottom:"0.75rem",fontSize:"0.8rem"}}>
            <span style={{display:"inline-block",transform:showPast?"rotate(90deg)":"none",transition:"transform 0.18s",fontSize:"0.7rem"}}>▶</span>
            Past Messages ({pastEntries.length})
          </button>
          {showPast&&(
            <div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>
              {pastEntries.slice().reverse().map(e=>(
                <div key={e.id} style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:14,padding:"1rem 1.2rem",boxShadow:"0 1px 6px rgba(0,0,0,0.04)",opacity:0.75}}>
                  <p style={{color:C.text,fontSize:"0.88rem",lineHeight:1.6,margin:"0 0 0.4rem"}}>{e.body}</p>
                  <span style={{color:C.muted,fontSize:"0.7rem"}}>by {e.authorName} · {fmtDateShort(e.createdAt)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {todayPairs.length>0&&(
        <div style={{marginBottom:"1.5rem"}}>
          <div style={secH}>Today's Shifts</div>
          <div style={cardStyle}><ShiftTable pairs={todayPairs}/></div>
        </div>
      )}

      {allPairs.length>0&&(
        <div>
          <div style={secH}>Shift History</div>
          <GroupedRecords pairs={allPairs}/>
        </div>
      )}
    </div>
  );
}

                          <span style={{width:5,height:5,borderRadius:"50%",background:C.green}}></span>In</span>

// ── KioskView ─────────────────────────────────────────────────────────────────
function KioskView({users,records,onKioskClock,onExit}){
  const[selected,setSelected]=useState(null);
  const[pin,setPin]=useState("");
  const[error,setError]=useState("");
  const[confirmed,setConfirmed]=useState(null);
  const[activeLetter,setActiveLetter]=useState("ALL");
  const gridRef=useRef(null);

  const staffUsers=users.filter(u=>u.role==="staff").sort((a,b)=>a.name.localeCompare(b.name));
  const letters=["ALL",...[...new Set(staffUsers.map(u=>u.name[0].toUpperCase()))].sort()];
  const filtered=activeLetter==="ALL"?staffUsers:staffUsers.filter(u=>u.name[0].toUpperCase()===activeLetter);

  const isClockedIn=(userId)=>{
    const recs=[...records].filter(r=>r.userId===userId).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    return recs.length>0&&recs[0].type==="in";
  };

  const handleDigit=(d)=>{
    if(pin.length>=4)return;
    const next=pin+d;
    setPin(next);setError("");
    if(next.length===4){
      setTimeout(()=>{
        const correctPin=(selected.pin||"0000");
        if(next===correctPin){
          const type=isClockedIn(selected.id)?"out":"in";
          onKioskClock(selected.id,selected.name,type);
          setConfirmed({type,name:selected.name});
          setTimeout(()=>{setSelected(null);setPin("");setConfirmed(null);},2500);
        } else {
          setError("Incorrect PIN. Try again.");
          setPin("");
        }
      },150);
    }
  };

  const handleDel=()=>{setPin(p=>p.slice(0,-1));setError("");};
  const handleBack=()=>{setSelected(null);setPin("");setError("");};
  const KEYS=["1","2","3","4","5","6","7","8","9","","0","⌫"];

  if(confirmed){
    const isIn=confirmed.type==="in";
    return(
      <div style={{minHeight:"100vh",background:isIn?"#f0fdf4":"#fff5f5",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"1rem",fontFamily:"'DM Sans',sans-serif"}}>
        <div style={{fontSize:"5rem"}}>{isIn?"✅":"👋"}</div>
        <div style={{fontSize:"2rem",fontWeight:600,color:isIn?C.greenText:C.red}}>{confirmed.name}</div>
        <div style={{fontSize:"1.2rem",color:isIn?C.greenText:C.red,fontWeight:500}}>{isIn?"Clocked In":"Clocked Out"} · {new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</div>
      </div>
    );
  }

  if(selected){
    const clocked=isClockedIn(selected.id);
    return(
      <div style={{minHeight:"100vh",background:"#f5f5f7",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",fontFamily:"'DM Sans',sans-serif"}}>
        <div style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:28,padding:"2.5rem 2rem",width:"100%",maxWidth:340,boxShadow:"0 4px 32px rgba(0,0,0,0.08)",textAlign:"center"}}>
          <div style={{marginBottom:"1.8rem"}}>
            <div style={{width:60,height:60,borderRadius:"50%",background:C.blue,color:"#fff",fontSize:"1.5rem",fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 0.75rem"}}>
              {selected.name[0]}
            </div>
            <div style={{fontSize:"1.25rem",fontWeight:600,color:C.text}}>{selected.name}</div>
            <div style={{display:"inline-flex",alignItems:"center",gap:"0.4rem",marginTop:"0.4rem",padding:"0.25rem 0.8rem",borderRadius:20,fontSize:"0.78rem",fontWeight:500,
              ...(clocked?{background:"rgba(40,205,65,0.1)",border:"1px solid rgba(40,205,65,0.28)",color:C.greenText}:{background:"#f5f5f7",border:"1px solid #e8e8ed",color:C.sub})}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:clocked?C.green:"#a1a1a6"}}></span>
              {clocked?"Currently Clocked In":"Not Clocked In"}
            </div>
          </div>
          <div style={{fontSize:"0.82rem",color:C.sub,marginBottom:"1.2rem",fontWeight:500}}>
            Enter PIN to clock <strong style={{color:clocked?C.red:C.greenText}}>{clocked?"out":"in"}</strong>
          </div>
          <div style={{display:"flex",gap:"0.9rem",justifyContent:"center",marginBottom:"0.6rem"}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{width:14,height:14,borderRadius:"50%",background:i<pin.length?C.text:"#e8e8ed",transition:"background 0.12s"}}/>
            ))}
          </div>
          <div style={{minHeight:"1.6rem",marginBottom:"0.3rem"}}>
            {error&&<p style={{color:C.red,fontSize:"0.8rem",margin:0}}>{error}</p>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.55rem",marginBottom:"1.3rem"}}>
            {KEYS.map((k,i)=>(
              k===""?<div key={i}/>:
              <button key={i} onClick={()=>k==="⌫"?handleDel():handleDigit(k)}
                style={{background:k==="⌫"?"#f5f5f7":"#fff",border:"1px solid #e8e8ed",borderRadius:14,
                  padding:"1rem 0",fontSize:k==="⌫"?"1.2rem":"1.35rem",fontWeight:k==="⌫"?400:500,
                  color:C.text,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
                  boxShadow:"0 1px 4px rgba(0,0,0,0.05)",lineHeight:1}}>
                {k}
              </button>
            ))}
          </div>
          <button onClick={handleBack} style={{background:"none",border:"none",color:C.muted,fontSize:"0.85rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            ← Back to staff list
          </button>
        </div>
      </div>
    );
  }

  const now=new Date();
  const timeStr=now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
  const dateStr=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const clockedInCount=staffUsers.filter(u=>isClockedIn(u.id)).length;

  return(
    <div style={{minHeight:"100vh",background:"#f0f0f5",display:"flex",flexDirection:"column",fontFamily:"'DM Sans',sans-serif"}}>
      {/* Header */}
      <div style={{background:C.blue,padding:"0.85rem 1.5rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{color:"#fff",fontSize:"1.1rem",fontWeight:600}}>Ocean Island Inn · Staff Kiosk</div>
          <div style={{color:"rgba(255,255,255,0.75)",fontSize:"0.76rem"}}>{dateStr} · {timeStr}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"1rem"}}>
          <div style={{color:"rgba(255,255,255,0.85)",fontSize:"0.8rem"}}>
            <span style={{fontWeight:600,color:"#fff"}}>{clockedInCount}</span> of {staffUsers.length} in
          </div>
          <button onClick={onExit} style={{background:"rgba(255,255,255,0.18)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:980,color:"#fff",padding:"0.38rem 0.9rem",fontSize:"0.8rem",fontWeight:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            Exit
          </button>
        </div>
      </div>

      {/* Sub-header */}
      <div style={{background:"#fff",borderBottom:"1px solid #e8e8ed",padding:"0.65rem 1.5rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{color:C.sub,fontSize:"0.84rem"}}>Use face scan or select your name and enter your PIN</span>
        <span style={{color:C.muted,fontSize:"0.78rem"}}>{filtered.length} staff shown</span>
      </div>

      {/* Main area */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto"}}>
          {/* Face scan banner */}
          <FaceKioskScan
            users={staffUsers}
            records={records}
            onClock={onKioskClock}
            onFallback={()=>{}}
          />

          {/* Staff grid */}
          <div ref={gridRef} style={{padding:"0.75rem"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:"0.65rem"}}>
              {filtered.map(u=>{
                const clocked=isClockedIn(u.id);
                return(
                  <button key={u.id} onClick={()=>{setSelected(u);setPin("");setError("");}}
                    style={{background:"#fff",border:`2px solid ${clocked?"rgba(40,205,65,0.4)":"#e8e8ed"}`,borderRadius:16,
                      padding:"1.1rem 0.6rem 0.9rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
                      boxShadow:clocked?"0 2px 12px rgba(40,205,65,0.14)":"0 1px 4px rgba(0,0,0,0.05)",
                      textAlign:"center",transition:"transform 0.1s"}}>
                    <div style={{width:42,height:42,borderRadius:"50%",
                      background:clocked?"rgba(40,205,65,0.15)":"#f0f0f5",
                      color:clocked?C.greenText:"#888",
                      fontSize:"1.1rem",fontWeight:700,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      margin:"0 auto 0.55rem",border:clocked?"2px solid rgba(40,205,65,0.3)":"2px solid transparent"}}>
                      {u.name[0]}
                    </div>
                    <div style={{fontSize:"0.88rem",fontWeight:600,color:C.text,lineHeight:1.25,marginBottom:"0.3rem",wordBreak:"break-word"}}>{u.name}</div>
                    <div style={{fontSize:"0.64rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",color:clocked?C.greenText:C.muted}}>
                      {clocked?"● Clocked In":"○ Clocked Out"}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>

        {/* Alphabet sidebar */}
        <div style={{width:68,background:"#fff",borderLeft:"1px solid #e8e8ed",display:"flex",flexDirection:"column",alignItems:"center",padding:"0.5rem 0",gap:"0.2rem",overflowY:"auto"}}>
          {letters.map(l=>(
            <button key={l} onClick={()=>setActiveLetter(l)}
              style={{width:46,padding:"0.45rem 0",borderRadius:10,border:"none",cursor:"pointer",
                fontFamily:"'DM Sans',sans-serif",fontSize:l==="ALL"?"0.65rem":"0.88rem",fontWeight:600,
                background:activeLetter===l?C.blue:"transparent",
                color:activeLetter===l?"#fff":C.sub,
                transition:"background 0.15s"}}>
              {l}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[users,setUsers]=useState([]);
  const[records,setRecords]=useState([]);
  const[innCoords,setInnCoords]=useState(DEFAULT_INN);
  const[journalEntries,setJournalEntries]=useState([]);
  const[readEntries,setReadEntries]=useState([]);
  const[showKiosk,setShowKiosk]=useState(false);
  const[lid,setLid]=useState("");
  const[lpw,setLpw]=useState("");
  const[lerr,setLerr]=useState("");
  const[loaded,setLoaded]=useState(false);

  useEffect(()=>{
    (async()=>{
      let[us,recs,coords,journal]=await Promise.all([DB.getUsers(),DB.getRecords(),DB.getCoords(),DB.getJournal()]);
      if(!us||us.filter(u=>u.role!=="system").length===0){
        us=SEED_USERS;
        await Promise.all(SEED_USERS.map(u=>DB.upsertUser(u)));
      }
      us=(us||[]).filter(u=>u.role!=="system");
      us=us.filter(u=>!OLD_DEMO_IDS.includes(u.id));
      const storedIds=new Set(us.map(u=>u.id));
      SEED_USERS.forEach(s=>{if(!storedIds.has(s.id))us.push(s);});
      const pwStore=JSON.parse(localStorage.getItem("oi_passwords")||"{}");
      us=us.map(u=>{
        const seed=SEED_USERS.find(s=>s.id===u.id);
        const pw=pwStore[u.id]||seed?.password||"pass123";
        return{...u,password:pw};
      });
      us=us.map(u=>{
        if(u.role==="staff"&&u.pin===undefined)return{...u,pin:"0000"};
        return u;
      });
      await Promise.all(us.map(u=>DB.upsertUser(u)));
      setUsers(us);setRecords(recs||[]);setInnCoords(coords||DEFAULT_INN);setJournalEntries(journal||[]);
      setLoaded(true);
    })();
  },[]);

  const handleLogin=()=>{
    setLerr("");
    const u=users.find(x=>x.username===lid.toLowerCase().trim());
    if(!u||u.password!==lpw){setLerr("Incorrect username or password.");return;}
    setReadEntries([]);
    setUser({...u});
  };

  const handleClock=useCallback(async(type,coords,onSite)=>{
    const rec={id:mkId(),userId:user.id,userName:user.name,type,timestamp:new Date().toISOString(),lat:coords?.lat??null,lng:coords?.lng??null,onSite};
    const updated=[...records,rec];setRecords(updated);await DB.insertRecord(rec);
  },[user,records]);

  const handleKioskClock=useCallback(async(userId,userName,type)=>{
    const rec={id:mkId(),userId,userName,type,timestamp:new Date().toISOString(),lat:null,lng:null,onSite:true};
    const updated=[...records,rec];setRecords(updated);await DB.insertRecord(rec);
  },[records]);

  const handleSaveCoords=useCallback(async(coords)=>{setInnCoords(coords);await DB.setCoords(coords);},[]);
  const handleAddUser=useCallback(async(u)=>{
    const up=[...users,u];setUsers(up);
    const pwStore=JSON.parse(localStorage.getItem("oi_passwords")||"{}");
    pwStore[u.id]=u.password;
    localStorage.setItem("oi_passwords",JSON.stringify(pwStore));
    await DB.upsertUser(u);
  },[users]);
  const handleDeleteUser=useCallback(async(id)=>{
    const up=users.filter(u=>u.id!==id);setUsers(up);
    const pwStore=JSON.parse(localStorage.getItem("oi_passwords")||"{}");
    delete pwStore[id];
    localStorage.setItem("oi_passwords",JSON.stringify(pwStore));
    await DB.deleteUser(id);
  },[users]);
  const handleUpdateUser=useCallback(async(id,changes)=>{
    const up=users.map(u=>u.id===id?{...u,...changes}:u);
    setUsers(up);await DB.upsertUser({...users.find(u=>u.id===id),...changes,id});
    if(user?.id===id)setUser(u=>({...u,...changes}));
  },[users,user]);
  const handleAddEntry=useCallback(async(e)=>{const up=[...journalEntries,e];setJournalEntries(up);await DB.insertJournal(e);},[journalEntries]);
  const handleDeleteEntry=useCallback(async(id)=>{const up=journalEntries.filter(e=>e.id!==id);setJournalEntries(up);await DB.deleteJournal(id);},[journalEntries]);
  const handleRead=useCallback((id)=>setReadEntries(p=>[...p,id]),[]);

  const FONTS=`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');`;

  if(!loaded)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif",color:C.sub}}>
      <style>{FONTS}</style>Loading…
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif"}}>
      <style>{FONTS}</style>
      {showKiosk?(
        <KioskView users={users} records={records} onKioskClock={handleKioskClock} onExit={()=>setShowKiosk(false)}/>
      ):!user?(
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
          <div style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:24,padding:"2.8rem 2.4rem",width:"100%",maxWidth:385,boxShadow:"0 4px 32px rgba(0,0,0,0.08)"}}>
            <div style={{textAlign:"center",marginBottom:"2rem"}}>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"1.75rem",fontWeight:400,color:C.text,letterSpacing:"0.02em",lineHeight:1.2}}>Ocean Island Inn</div>
              <p style={{color:C.muted,fontSize:"0.74rem",letterSpacing:"0.08em",textTransform:"uppercase",margin:"0.3rem 0 0"}}>Staff Time Clock</p>
            </div>

            <label style={{...lbl,marginTop:0}}>Username</label>
            <input style={inp()} type="text" placeholder="Enter username" value={lid} onChange={e=>setLid(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
            <label style={lbl}>Password</label>
            <input style={inp()} type="password" placeholder="Enter password" value={lpw} onChange={e=>setLpw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
            {lerr&&<p style={{color:C.red,fontSize:"0.8rem",textAlign:"center",marginTop:"0.65rem"}}>{lerr}</p>}
            <button style={{...btnPrimary,width:"100%",padding:"0.82rem",marginTop:"1.4rem",fontSize:"0.95rem"}} onClick={handleLogin}>Sign In</button>

            {/* Demo accounts */}
            <div style={{marginTop:"1.3rem",borderTop:"1px solid #e8e8ed",paddingTop:"1rem"}}>
              <p style={{color:C.muted,fontSize:"0.7rem",textAlign:"center",marginBottom:"0.5rem",letterSpacing:"0.04em"}}>DEMO ACCOUNTS</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.3rem"}}>
                {[["admin","admin123","👑 Manager"],["nazeem","pass123","Nazeem"],["asha","pass123","Asha"],["charlie","pass123","Charlie"]].map(([id,pw,label])=>(
                  <div key={id} style={{background:"#f5f5f7",border:"1px solid #e8e8ed",borderRadius:8,padding:"0.38rem 0.5rem",color:C.text,fontSize:"0.71rem",textAlign:"center",cursor:"pointer"}} onClick={()=>{setLid(id);setLpw(pw);}}>
                    {label}
                  </div>
                ))}
              </div>
            </div>

            {/* Face + Kiosk options */}
            <div style={{marginTop:"1.2rem",borderTop:"1px solid #e8e8ed",paddingTop:"1.1rem",display:"flex",flexDirection:"column",gap:"0.5rem"}}>
              <FaceLoginButton
                users={users}
                onSuccess={(u)=>{setReadEntries([]);setUser({...u});}}
                onFallback={()=>setShowKiosk(true)}
              />
              <button onClick={()=>setShowKiosk(true)} style={{background:"#f5f5f7",border:"1px solid #e8e8ed",borderRadius:980,color:C.text,fontSize:"0.82rem",fontWeight:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"inline-flex",alignItems:"center",gap:"0.4rem",padding:"0.45rem 1rem",justifyContent:"center",width:"100%"}}>
                <span>🖥</span> Use Staff Kiosk instead
              </button>
            </div>
          </div>
          <Footer/>
        </div>
      ):(
        <>
          <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0.65rem 1.5rem",borderBottom:"1px solid #e8e8ed",background:"rgba(255,255,255,0.9)",backdropFilter:"blur(18px)",position:"sticky",top:0,zIndex:10}}>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"1.05rem",fontWeight:400,color:C.text,letterSpacing:"0.02em"}}>Ocean Island Inn</div>
            <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
              <span style={{color:C.text,fontSize:"0.84rem",fontWeight:500}}>
                {user.name}
                {user.role==="admin"&&<span style={{background:C.blue,color:"#fff",fontSize:"0.6rem",fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",padding:"0.16rem 0.48rem",borderRadius:20,marginLeft:"0.4rem"}}>Admin</span>}
              </span>
              <button style={btnGhost} onClick={()=>setUser(null)}>Sign Out</button>
            </div>
          </header>
          {user.role==="admin"
            ?<AdminView users={users} records={records} innCoords={innCoords} onSaveCoords={handleSaveCoords} onAddUser={handleAddUser} onDeleteUser={handleDeleteUser} onUpdateUser={handleUpdateUser} journalEntries={journalEntries} onAddEntry={handleAddEntry} onDeleteEntry={handleDeleteEntry} currentUser={user}/>
            :<StaffView user={user} records={records} onClock={handleClock} innCoords={innCoords} journalEntries={journalEntries} readEntries={readEntries} onRead={handleRead}/>
          }
          <Footer/>
        </>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
