// ── Helpers ───────────────────────────────────────────────────────────────────
function haversineM(la1,lo1,la2,lo2){const R=6371000,dLa=((la2-la1)*Math.PI)/180,dLo=((lo2-lo1)*Math.PI)/180,a=Math.sin(dLa/2)**2+Math.cos((la1*Math.PI)/180)*Math.cos((la2*Math.PI)/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function mkId(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function fmtTime(iso){return new Date(iso).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});}
function fmtDate(iso){return new Date(iso).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function fmtDateShort(iso){return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function dur(a,b){if(!a||!b)return null;const ms=new Date(b)-new Date(a),h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return`${h}h ${m}m`;}

function buildPairs(records,filterUserId){
  const byUser={};
  records.filter(r=>!filterUserId||r.userId===filterUserId)
    .sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp))
    .forEach(r=>{(byUser[r.userId]=byUser[r.userId]||[]).push(r);});
  const pairs=[];
  Object.values(byUser).forEach(recs=>{
    let open=null;
    recs.forEach(r=>{
      if(r.type==="in"){if(open)pairs.push({name:open.userName,userId:open.userId,inTime:open.timestamp,outTime:null,onSite:open.onSite,selfieUrl:open.selfieUrl??null});open=r;}
      else if(r.type==="out"&&open){pairs.push({name:open.userName,userId:open.userId,inTime:open.timestamp,outTime:r.timestamp,onSite:open.onSite,selfieUrl:open.selfieUrl??null});open=null;}
    });
    if(open)pairs.push({name:open.userName,userId:open.userId,inTime:open.timestamp,outTime:null,onSite:open.onSite,selfieUrl:open.selfieUrl??null});
  });
  return pairs.sort((a,b)=>new Date(b.inTime)-new Date(a.inTime));
}

function exportCSV(records){
  const pairs=buildPairs(records);
  const hdr="Staff,Date,Clock In,Clock Out,Duration,Status,Device,IP\n";
  const rows=pairs.map(p=>[p.name,fmtDate(p.inTime),fmtTime(p.inTime),p.outTime?fmtTime(p.outTime):"Still In",p.outTime?dur(p.inTime,p.outTime):"",p.onSite===null?"No GPS":p.onSite?"On-Site":"Remote",p.deviceType||"",p.ip||""].join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([hdr+rows],{type:"text/csv"}));a.download=`OceanIslandInn_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

// ── Device fingerprint ────────────────────────────────────────────────────────
async function getDeviceInfo(){
  const fp = [
    navigator.userAgent,
    navigator.language,
    screen.width + 'x' + screen.height,
    screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency||'',
    navigator.deviceMemory||'',
  ].join('|');
  let hash = 0;
  for(let i=0;i<fp.length;i++){ hash = ((hash<<5)-hash)+fp.charCodeAt(i); hash|=0; }
  const deviceId = Math.abs(hash).toString(36);
  const deviceType = /iPhone/i.test(navigator.userAgent)?'iPhone'
    :/iPad/i.test(navigator.userAgent)?'iPad'
    :/Android/i.test(navigator.userAgent)?'Android'
    :'Desktop';
  let ip = null;
  try{
    const r = await fetch('https://api.ipify.org?format=json',{signal:AbortSignal.timeout(3000)});
    const d = await r.json();
    ip = d.ip;
  }catch(e){}
  return {deviceId, deviceType, ip, ua: navigator.userAgent.slice(0,120)};
}

// ── Journal swipe card ────────────────────────────────────────────────────────
function JournalCard({entry,onRead}){
  const cardRef=useRef(null);
  const startX=useRef(null);
  const[dx,setDx]=useState(0);
  const[dismissing,setDismissing]=useState(false);

  const onPointerDown=(e)=>{startX.current=e.clientX;cardRef.current?.setPointerCapture(e.pointerId);};
  const onPointerMove=(e)=>{if(startX.current===null)return;const d=e.clientX-startX.current;if(d>0)setDx(d);};
  const onPointerUp=()=>{
    if(dx>100){setDismissing(true);setTimeout(()=>{onRead(entry.id);setDx(0);setDismissing(false);},320);}
    else setDx(0);
    startX.current=null;
  };

  const progress=Math.min(dx/130,1);
  const tx=dismissing?440:dx;
  const opacity=dismissing?0:1;

  return(
    <div ref={cardRef} onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={()=>{setDx(0);startX.current=null;}}
      style={{position:"absolute",top:0,left:0,right:0,background:"#fff",borderRadius:20,border:"1px solid #e8e8ed",
        boxShadow:"0 4px 28px rgba(0,0,0,0.09)",padding:"1.5rem 1.6rem 1.3rem",
        transform:`translateX(${tx}px) rotate(${progress*6}deg)`,opacity,
        transition:dx===0||dismissing?"transform 0.32s cubic-bezier(.22,.68,0,1.2), opacity 0.28s ease":"none",
        cursor:"grab",userSelect:"none",touchAction:"pan-y"}}>
      <p style={{color:C.text,fontSize:"0.95rem",lineHeight:1.65,margin:"0 0 1rem"}}>{entry.body}</p>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"0.5rem"}}>
        <span style={{color:C.muted,fontSize:"0.72rem"}}>by {entry.authorName} · {fmtDateShort(entry.createdAt)}</span>
        <span style={{display:"flex",alignItems:"center",gap:"0.3rem",color:dx>40?C.greenText:C.muted,fontSize:"0.72rem",fontWeight:500,transition:"color 0.15s",whiteSpace:"nowrap"}}>
          <span>→</span> Swipe to mark read
        </span>
      </div>
    </div>
  );
}

function JournalStack({entries,onRead}){
  if(!entries.length)return null;
  const visible=entries.slice(0,3);

      </div>
      <div style={{position:"relative",height:185}}>
        {visible.slice().reverse().map((entry,ri)=>{
          const i=visible.length-1-ri;

            <div key={entry.id} style={{position:"absolute",top:0,left:0,right:0,

// ── GroupedRecords ────────────────────────────────────────────────────────────
// Collects selfie URLs per user for the gallery view in admin Records tab
function GroupedRecords({pairs,showBadge=false,showSelfie=false,allPairsForGallery=null}){
  const[openY,setOpenY]=useState({});
  const[openM,setOpenM]=useState({});
  const[openW,setOpenW]=useState({});
  if(!pairs.length)return <div style={{...cardStyle,padding:"3rem",textAlign:"center",color:C.muted,fontSize:"0.88rem"}}>No shifts recorded yet.</div>;

  // Build a map of userId → all selfie URLs (newest first) for gallery
  const userSelfies = {};
  if(allPairsForGallery){
    allPairsForGallery.forEach(p=>{
      if(p.selfieUrl){
        if(!userSelfies[p.userId]) userSelfies[p.userId] = {name:p.name, urls:[]};
        userSelfies[p.userId].urls.push(p.selfieUrl);
      }
    });
  }

  function wkStart(d){const m=new Date(d);m.setDate(d.getDate()-((d.getDay()+6)%7));m.setHours(0,0,0,0);return m;}
  function wkKey(d){return wkStart(d).toISOString().slice(0,10);}
  function wkLabel(d){const m=wkStart(d),e=new Date(m);e.setDate(m.getDate()+6);return`Week of ${m.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${e.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;}
  function mKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;}
  function mLabel(d){return d.toLocaleDateString("en-US",{month:"long",year:"numeric"});}

  const tree={};
  pairs.forEach(p=>{
    const d=new Date(p.inTime),y=d.getFullYear(),mk=mKey(d),wk=wkKey(d);
    if(!tree[y])tree[y]={};
    if(!tree[y][mk])tree[y][mk]={label:mLabel(d),weeks:{}};
    if(!tree[y][mk].weeks[wk])tree[y][mk].weeks[wk]={label:wkLabel(d),pairs:[]};
    tree[y][mk].weeks[wk].pairs.push(p);
  });

  const years=Object.keys(tree).sort((a,b)=>b-a);
  const isYOpen=y=>openY[y]===undefined?parseInt(y)===new Date().getFullYear():openY[y];
  const isMOpen=k=>openM[k]===undefined?true:openM[k];
  const isWOpen=k=>openW[k]===undefined?true:openW[k];
  const totalMs=ps=>{let ms=0;ps.forEach(p=>{if(p.outTime)ms+=new Date(p.outTime)-new Date(p.inTime);});if(!ms)return null;return`${Math.floor(ms/3600000)}h ${Math.floor((ms%3600000)/60000)}m`;};
  const pill=n=><span style={{background:"#e8f0fe",border:"1px solid #c5d5f5",borderRadius:20,padding:"0.12rem 0.48rem",fontSize:"0.67rem",color:C.blue,marginLeft:"0.4rem"}}>{n} shift{n!==1?"s":""}</span>;
  const chev=o=><span style={{display:"inline-block",transform:o?"rotate(90deg)":"none",transition:"transform 0.18s",marginRight:"0.4rem",color:C.muted,fontSize:"0.72rem"}}>▶</span>;

  // Custom ShiftTable that uses UserSelfieGallery instead of SelfieThumb
  const ShiftTableWithGallery = ({pairs: wPairs, showName, showBadge: sb2, showSelfie: ss}) => {
    if(!wPairs.length) return <div style={{textAlign:"center",padding:"2.5rem",color:C.muted,fontSize:"0.88rem"}}>No shifts recorded yet.</div>;
    return(
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            {showName&&<th style={TH}>Staff</th>}
            <th style={TH}>Date</th><th style={TH}>In</th><th style={TH}>Out</th><th style={TH}>Duration</th>
            {sb2&&<th style={TH}>Location</th>}
            {ss&&<th style={TH}>Photos</th>}
          </tr></thead>
          <tbody>{wPairs.map((p,i)=>{
            // For each row, get that user's full selfie history
            const gallery = userSelfies[p.userId];
            return(
              <tr key={i} style={{background:i%2===0?"#fff":"#fafafa"}}>
                {showName&&<td style={{...TD,fontWeight:500}}>{p.name}</td>}
                <td style={{...TD,color:C.sub,fontSize:"0.8rem"}}>{fmtDate(p.inTime)}</td>
                <td style={TD}>{fmtTime(p.inTime)}</td>
                <td style={TD}>{p.outTime?fmtTime(p.outTime):<span style={{color:C.green,fontSize:"0.78rem",fontWeight:500}}>● Active</span>}</td>
                <td style={{...TD,color:C.sub,fontSize:"0.8rem"}}>{p.outTime?dur(p.inTime,p.outTime):"—"}</td>
                {sb2&&<td style={TD}><SiteBadge onSite={p.onSite}/></td>}
                {ss&&<td style={TD}>
                  {gallery
                    ? <UserSelfieGallery userName={gallery.name} selfieUrls={gallery.urls}/>
                    : <SelfieThumb url={p.selfieUrl}/>
                  }
                </td>}
              </tr>
            );
          })}</tbody>
        </table>
      </div>
    );
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
      {years.map(y=>{
        const yo=isYOpen(y);
        const yp=Object.values(tree[y]).flatMap(m=>Object.values(m.weeks).flatMap(w=>w.pairs));
        return(
          <div key={y} style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:16,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
            <div onClick={()=>setOpenY(s=>({...s,[y]:!isYOpen(y)}))} style={{display:"flex",alignItems:"center",padding:"0.9rem 1.3rem",cursor:"pointer",background:"#f5f5f7",borderBottom:yo?"1px solid #e8e8ed":"none"}}>
              {chev(yo)}<span style={{fontWeight:600,color:C.text}}>{y}</span>{pill(yp.length)}
              {totalMs(yp)&&<span style={{marginLeft:"auto",color:C.sub,fontSize:"0.76rem"}}>{totalMs(yp)} total</span>}
            </div>
            {yo&&Object.keys(tree[y]).sort((a,b)=>b.localeCompare(a)).map(mk=>{
              const mo=tree[y][mk],mop=isMOpen(mk);
              const mp=Object.values(mo.weeks).flatMap(w=>w.pairs);
              return(
                <div key={mk} style={{borderBottom:"1px solid #f0f0f5"}}>
                  <div onClick={()=>setOpenM(s=>({...s,[mk]:!isMOpen(mk)}))} style={{display:"flex",alignItems:"center",padding:"0.7rem 1.3rem 0.7rem 2rem",cursor:"pointer",background:"#fafafa"}}>
                    {chev(mop)}<span style={{fontWeight:500,color:C.text,fontSize:"0.9rem"}}>{mo.label}</span>{pill(mp.length)}
                    {totalMs(mp)&&<span style={{marginLeft:"auto",color:C.sub,fontSize:"0.74rem"}}>{totalMs(mp)}</span>}
                  </div>
                  {mop&&Object.keys(mo.weeks).sort((a,b)=>b.localeCompare(a)).map(wk=>{
                    const we=mo.weeks[wk],wop=isWOpen(wk);
                    return(
                      <div key={wk}>
                        <div onClick={()=>setOpenW(s=>({...s,[wk]:!isWOpen(wk)}))} style={{display:"flex",alignItems:"center",padding:"0.55rem 1.3rem 0.55rem 3rem",cursor:"pointer",borderTop:"1px solid #f5f5f7"}}>
                          {chev(wop)}<span style={{color:C.sub,fontSize:"0.82rem"}}>{we.label}</span>{pill(we.pairs.length)}
                          {totalMs(we.pairs)&&<span style={{marginLeft:"auto",color:C.muted,fontSize:"0.72rem"}}>{totalMs(we.pairs)}</span>}
                        </div>
                        {wop&&(showSelfie && allPairsForGallery
                          ? <ShiftTableWithGallery pairs={we.pairs} showName={showBadge} showBadge={showBadge} showSelfie={showSelfie}/>
                          : <ShiftTable pairs={we.pairs} showName={showBadge} showBadge={showBadge} showSelfie={showSelfie}/>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

        {ok&&<p style={{color:C.green,fontSize:"0.8rem",marginBottom:"0.5rem"}}>{ok}</p>}
        <button style={btnPrimary} onClick={handleAdd}>Create User</button>
      </div>
    </div>
  );

        <label style={{...lbl,marginTop:0}}>Message</label>

          {DEPARTMENTS.map(d=>(
            <button key={d} onClick={()=>tog(d)} style={{fontSize:"0.72rem",fontWeight:600,padding:"0.28rem 0.75rem",borderRadius:20,cursor:"pointer",border:"1px solid",
              ...(depts.includes(d)?{background:"#e8f0fe",color:"#1a56db",borderColor:"#c5d5f5"}:{background:"#f5f5f7",color:C.muted,borderColor:"#e8e8ed"})}}>

        <button style={btnPrimary} onClick={handlePost}>Post Message</button>
      </div>

      <div style={secH}>Posted Messages</div>
      {!entries.length&&<p style={{color:C.muted,fontSize:"0.88rem"}}>No messages posted yet.</p>}
      {entries.slice().reverse().map(e=>(
        <div key={e.id} style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:16,padding:"1.2rem 1.4rem",marginBottom:"0.7rem",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"0.75rem",marginBottom:"0.5rem"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:"0.3rem"}}>{e.departments.map(d=><DeptPill key={d} dept={d}/>)}</div>
            <span style={{color:C.muted,fontSize:"0.72rem",whiteSpace:"nowrap"}}>{fmtDateShort(e.createdAt)}</span>
          </div>
          <p style={{color:C.text,fontSize:"0.88rem",lineHeight:1.6,margin:"0.4rem 0 0.7rem"}}>{e.body}</p>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{color:C.muted,fontSize:"0.72rem"}}>by {e.authorName}</span>
            <button style={{...btnDanger,fontSize:"0.72rem",padding:"0.2rem 0.6rem"}} onClick={()=>onDelete(e.id)}>Delete</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── SelfieCapture ─────────────────────────────────────────────────────────────
// Shows a "get ready" message, then 3-2-1 countdown, then opens camera
function SelfieCapture({userName, onCapture, onSkip}){
  const [phase, setPhase] = useState("getready"); // getready|countdown|starting|ready|captured|error
  const [countdown, setCountdown] = useState(3);
  const [msg, setMsg] = useState("");
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);

  const stopCamera = () => {
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    streamRef.current = null;
  };

  const startCamera = async () => {
    setPhase("starting");
    try{
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:640},height:{ideal:480}}});
      streamRef.current = stream;
      if(videoRef.current){
        videoRef.current.srcObject = stream;
        await videoRef.current.play().catch(()=>{});
      }
      setPhase("ready");
    }catch(e){
      console.warn("Selfie camera error:", e);
      setMsg("Camera unavailable");
      setPhase("error");
      setTimeout(()=>{ onSkip(); }, 1200);
    }
  };

  // Phase 1: "Get ready" screen for 1.5s, then countdown
  useEffect(()=>{
    if(phase !== "getready") return;
    const t = setTimeout(()=>{
      setPhase("countdown");
      setCountdown(3);
    }, 1500);
    return ()=>clearTimeout(t);
  },[phase]);

  // Phase 2: countdown 3 → 2 → 1, then start camera
  useEffect(()=>{
    if(phase !== "countdown") return;
    if(countdown <= 0){
      startCamera();
      return;
    }
    const t = setTimeout(()=> setCountdown(c=>c-1), 1000);
    return ()=>clearTimeout(t);
  },[phase, countdown]);

  useEffect(()=>{ return ()=>stopCamera(); },[]);

  const takePhoto = () => {
    const vid = videoRef.current;
    const canvas = canvasRef.current;
    if(!vid||!canvas) return;
    canvas.width = 480; canvas.height = 360;
    const ctx = canvas.getContext("2d");
    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(vid, -480, 0, 480, 360);
    ctx.restore();
    canvas.toBlob(blob=>{
      stopCamera();
      setPhase("captured");
      onCapture(blob);
    }, "image/jpeg", 0.65);
  };

  // ── Get Ready screen ──
  if(phase === "getready"){
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
        <div style={{textAlign:"center",maxWidth:300}}>
          <div style={{fontSize:"3.5rem",marginBottom:"1rem"}}>📸</div>
          <div style={{color:"#fff",fontSize:"1.3rem",fontWeight:600,marginBottom:"0.6rem"}}>Get ready, {userName.split(" ")[0]}!</div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:"0.9rem",lineHeight:1.6}}>A photo will be taken when you clock in. Look straight at the camera.</div>
          <button onClick={()=>{setPhase("countdown");setCountdown(3);}} style={{marginTop:"1.8rem",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:980,color:"#fff",padding:"0.7rem 1.8rem",fontSize:"0.9rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            OK, I'm ready
          </button>
          <div style={{marginTop:"0.9rem"}}>
            <button onClick={()=>{onSkip();}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:"0.8rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
              Skip photo
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── Countdown screen ──
  if(phase === "countdown"){
    const isGo = countdown <= 0;
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{textAlign:"center"}}>
          <div style={{
            fontSize:"8rem",fontWeight:700,lineHeight:1,
            color: countdown === 1 ? "#ff9f0a" : countdown === 2 ? "#fff" : "#fff",
            transition:"all 0.3s ease",
            textShadow: countdown === 1 ? "0 0 40px rgba(255,159,10,0.6)" : "0 0 40px rgba(255,255,255,0.2)",
            transform: `scale(${countdown === 0 ? 1.3 : 1})`,
          }}>
            {countdown === 0 ? "📸" : countdown}
          </div>
          <div style={{color:"rgba(255,255,255,0.55)",fontSize:"0.9rem",marginTop:"1rem"}}>
            {countdown > 0 ? "Starting camera…" : ""}
          </div>
        </div>
      </div>
    );
  }

  // ── Camera / Capture screen ──
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"1.5rem"}}>
      <div style={{width:"100%",maxWidth:380,display:"flex",flexDirection:"column",alignItems:"center",gap:"1rem"}}>
        <div style={{color:"#fff",fontSize:"1rem",fontWeight:600,textAlign:"center"}}>
          Quick selfie for {userName}
        </div>
        <div style={{color:"rgba(255,255,255,0.55)",fontSize:"0.78rem",textAlign:"center"}}>
          Look at the camera and tap the button
        </div>
        <div style={{position:"relative",width:"100%",borderRadius:20,overflow:"hidden",background:"#000",aspectRatio:"4/3",border:"2px solid rgba(255,255,255,0.15)"}}>
          <video ref={videoRef} autoPlay muted playsInline
            style={{width:"100%",height:"100%",objectFit:"cover",transform:"scaleX(-1)",
              filter:SELFIE_FILTER}}/>
          {/* Face guide oval */}
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <div style={{width:"55%",aspectRatio:"3/4",borderRadius:"50%",border:"2px dashed rgba(255,255,255,0.5)"}}/>
          </div>
          {phase==="starting"&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"0.85rem"}}>Starting camera...</div>}
          {phase==="captured"&&<div style={{position:"absolute",inset:0,background:"rgba(40,205,65,0.3)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:"4rem"}}>✓</div></div>}
          {phase==="error"&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"0.85rem"}}>{msg}</div>}
        </div>
        <canvas ref={canvasRef} style={{display:"none"}}/>
        {phase==="ready"&&(
          <div style={{display:"flex",gap:"0.75rem",width:"100%"}}>
            <button onClick={takePhoto} style={{flex:1,background:C.green,border:"none",borderRadius:980,color:"#fff",padding:"0.9rem",fontSize:"1rem",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
              📸 Take Photo
            </button>
            <button onClick={()=>{stopCamera();onSkip();}} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:980,color:"rgba(255,255,255,0.7)",padding:"0.9rem 1.2rem",fontSize:"0.85rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
              Skip
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── StaffView ─────────────────────────────────────────────────────────────────
function StaffView({user,records,onClock,innCoords,journalEntries,readEntries,onRead}){
  const[locMsg,setLocMsg]=useState(null);
  const[locColor,setLocColor]=useState(C.sub);
  const[showPast,setShowPast]=useState(false);
  const[showSelfie,setShowSelfie]=useState(false);
  const pendingClockRef=useRef(null);
  const userRecs=[...records].filter(r=>r.userId===user.id).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  const isClockedIn=userRecs.length>0&&userRecs[0].type==="in";
  const allPairs=buildPairs(records,user.id);
  const todayPairs=allPairs.filter(p=>new Date(p.inTime).toDateString()===new Date().toDateString());
  const myDepts=user.departments||[];
  const myEntries=journalEntries.filter(e=>e.departments.some(d=>myDepts.includes(d))&&!readEntries.includes(e.id));
  const pastEntries=journalEntries.filter(e=>e.departments.some(d=>myDepts.includes(d))&&readEntries.includes(e.id));

  const doClockWithLocation = (type, selfieBlob) => {
    setLocMsg("📡 Getting location…"); setLocColor(C.sub);
    const doRec=(coords,onSite)=>onClock(type,coords,onSite,selfieBlob);
    if(!navigator.geolocation){doRec(null,null);return;}
    navigator.geolocation.getCurrentPosition(pos=>{
      const loc={lat:pos.coords.latitude,lng:pos.coords.longitude};
      const dist=haversineM(loc.lat,loc.lng,innCoords.lat,innCoords.lng);
      const onSite=dist<=RADIUS_M;
      setLocMsg(onSite?`📍 On-site (${Math.round(dist)}m)`:`⚠️ Off-site (${Math.round(dist)}m from hotel)`);
      setLocColor(onSite?C.greenText:C.warn);
      doRec(loc,onSite);
    },()=>{setLocMsg(null);doRec(null,null);},{enableHighAccuracy:true,timeout:10000});
  };

  const handleClock=async(type)=>{
    if(type==="in"){
      pendingClockRef.current = type;
      setShowSelfie(true);
    } else {
      doClockWithLocation(type, null);
    }
  };

  const handleSelfieCapture=(blob)=>{
    setShowSelfie(false);
    doClockWithLocation(pendingClockRef.current, blob);
  };

  const handleSelfieSkip=()=>{
    setShowSelfie(false);
    doClockWithLocation(pendingClockRef.current, null);
  };

  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"2rem 1.5rem 5rem"}}>
      {showSelfie&&<SelfieCapture userName={user.name} onCapture={handleSelfieCapture} onSkip={handleSelfieSkip}/>}
      <div style={{...cardStyle,padding:"2.5rem 2rem 2rem",marginBottom:"1.5rem",textAlign:"center",overflow:"visible"}}>
        <div style={{marginBottom:"0.8rem"}}>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"1.55rem",fontWeight:400,color:C.text,letterSpacing:"0.02em",lineHeight:1.15}}>Ocean Island Inn</div>
          <div style={{color:C.muted,fontSize:"0.7rem",letterSpacing:"0.1em",textTransform:"uppercase",marginTop:"0.2rem"}}>Victoria, BC</div>
        </div>
        <LiveClock/>
        <div style={{color:C.sub,fontSize:"0.82rem",marginTop:"0.3rem",marginBottom:"1.4rem"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
        <div style={{display:"inline-flex",alignItems:"center",gap:"0.45rem",padding:"0.35rem 0.9rem",borderRadius:20,fontSize:"0.78rem",fontWeight:500,marginBottom:"1.4rem",
          ...(isClockedIn?{background:"rgba(40,205,65,0.1)",border:"1px solid rgba(40,205,65,0.28)",color:C.greenText}:{background:"#f5f5f7",border:"1px solid #e8e8ed",color:C.sub})}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:isClockedIn?C.green:"#a1a1a6"}}></span>
          {isClockedIn?"Clocked In":"Not Clocked In"}
        </div>
        <div style={{display:"flex",gap:"0.75rem",justifyContent:"center",flexWrap:"wrap"}}>
          {[{label:"Clock In",active:!isClockedIn,type:"in",bg:C.green},{label:"Clock Out",active:isClockedIn,type:"out",bg:C.red}].map(b=>(
            <button key={b.type} disabled={!b.active} onClick={()=>handleClock(b.type)}
              style={{background:b.bg,border:"none",borderRadius:980,color:"#fff",padding:"0.82rem 2.2rem",fontFamily:"'DM Sans',sans-serif",fontSize:"0.95rem",fontWeight:500,cursor:b.active?"pointer":"not-allowed",opacity:b.active?1:0.28}}>
              {b.label}
            </button>
          ))}
        </div>
        {locMsg&&<p style={{fontSize:"0.75rem",color:locColor,marginTop:"0.8rem"}}>{locMsg}</p>}
      </div>

      {myEntries.length>0&&<JournalStack entries={myEntries} onRead={onRead}/>}

      {pastEntries.length>0&&(
        <div style={{marginBottom:"1.5rem"}}>
          <button onClick={()=>setShowPast(s=>!s)} style={{...btnGhost,display:"flex",alignItems:"center",gap:"0.4rem",marginBottom:"0.75rem",fontSize:"0.8rem"}}>
            <span style={{display:"inline-block",transform:showPast?"rotate(90deg)":"none",transition:"transform 0.18s",fontSize:"0.7rem"}}>▶</span>
            Past Messages ({pastEntries.length})
          </button>
          {showPast&&(
            <div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>
              {pastEntries.slice().reverse().map(e=>(
                <div key={e.id} style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:14,padding:"1rem 1.2rem",boxShadow:"0 1px 6px rgba(0,0,0,0.04)",opacity:0.75}}>
                  <p style={{color:C.text,fontSize:"0.88rem",lineHeight:1.6,margin:"0 0 0.4rem"}}>{e.body}</p>
                  <span style={{color:C.muted,fontSize:"0.7rem"}}>by {e.authorName} · {fmtDateShort(e.createdAt)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {todayPairs.length>0&&(
        <div style={{marginBottom:"1.5rem"}}>
          <div style={secH}>Today's Shifts</div>
          <div style={cardStyle}><ShiftTable pairs={todayPairs}/></div>
        </div>
      )}

      {allPairs.length>0&&(
        <div>
          <div style={secH}>Shift History</div>
          <GroupedRecords pairs={allPairs}/>
        </div>
      )}
    </div>
  );
}

function AdminLoginModal({users, onLogin, onClose}){

        <label style={lbl}>PIN</label>

// ── KioskView ─────────────────────────────────────────────────────────────────
function KioskView({users,records,onKioskClock,onAdminLogin}){
  const[selected,setSelected]=useState(null);
  const[pin,setPin]=useState("");
  const[error,setError]=useState("");
  const[confirmed,setConfirmed]=useState(null);
  const[activeLetter,setActiveLetter]=useState("ALL");
  const[showKioskSelfie,setShowKioskSelfie]=useState(null);
  const[showAdminModal,setShowAdminModal]=useState(false);
  const[now,setNow]=useState(new Date());
  const gridRef=useRef(null);

  useEffect(()=>{
    const t=setInterval(()=>setNow(new Date()),1000);
    return()=>clearInterval(t);
  },[]);

  const staffUsers=users.filter(u=>u.role==="staff").sort((a,b)=>a.name.localeCompare(b.name));
  const letters=["ALL",...[...new Set(staffUsers.map(u=>u.name[0].toUpperCase()))].sort()];
  const filtered=activeLetter==="ALL"?staffUsers:staffUsers.filter(u=>u.name[0].toUpperCase()===activeLetter);

  const isClockedIn=(userId)=>{
    const recs=[...records].filter(r=>r.userId===userId).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    return recs.length>0&&recs[0].type==="in";
  };

  const handleDigit=(d)=>{
    if(pin.length>=4)return;
    const next=pin+d;
    setPin(next);setError("");
    if(next.length===4){
      setTimeout(()=>{
        const correctPin=(selected.pin||"0000");
        if(next===correctPin){
          const type=isClockedIn(selected.id)?"out":"in";
          if(type==="in"){
            setShowKioskSelfie({userId:selected.id,name:selected.name});
            setSelected(null);setPin("");
          } else {
            onKioskClock(selected.id,selected.name,type);
            setConfirmed({type,name:selected.name});
            setTimeout(()=>{setSelected(null);setPin("");setConfirmed(null);},2500);
          }
        } else {
          setError("Incorrect PIN. Try again.");
          setPin("");
        }
      },150);
    }
  };

  const handleDel=()=>{setPin(p=>p.slice(0,-1));setError("");};
  const handleBack=()=>{setSelected(null);setPin("");setError("");};
  const KEYS=["1","2","3","4","5","6","7","8","9","","0","⌫"];

  const timeStr=now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
  const dateStr=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const clockedInCount=staffUsers.filter(u=>isClockedIn(u.id)).length;

  if(confirmed){
    const isIn=confirmed.type==="in";
    return(
      <div style={{height:"100vh",background:isIn?"#f0fdf4":"#fff5f5",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"1.2rem",fontFamily:"'DM Sans',sans-serif"}}>
        <div style={{fontSize:"6rem",lineHeight:1}}>{isIn?"✅":"👋"}</div>
        <div style={{fontSize:"2.5rem",fontWeight:600,color:isIn?C.greenText:C.red}}>{confirmed.name}</div>
        <div style={{fontSize:"1.3rem",color:isIn?C.greenText:C.red,fontWeight:500,background:isIn?"rgba(40,205,65,0.1)":"rgba(255,59,48,0.08)",padding:"0.6rem 1.8rem",borderRadius:980}}>
          {isIn?"Clocked In":"Clocked Out"} · {now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}
        </div>
      </div>
    );
  }

  if(selected){
    const clocked=isClockedIn(selected.id);
    return(
      <div style={{height:"100vh",background:"#f0f0f5",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem",fontFamily:"'DM Sans',sans-serif"}}>
        <div style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:32,padding:"3rem 2.5rem",width:"100%",maxWidth:420,boxShadow:"0 8px 48px rgba(0,0,0,0.10)",textAlign:"center"}}>
          <div style={{marginBottom:"2rem"}}>
            <div style={{width:72,height:72,borderRadius:"50%",background:C.blue,color:"#fff",fontSize:"1.8rem",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 0.9rem"}}>
              {selected.name[0]}
            </div>
            <div style={{fontSize:"1.5rem",fontWeight:600,color:C.text}}>{selected.name}</div>
            <div style={{display:"inline-flex",alignItems:"center",gap:"0.4rem",marginTop:"0.5rem",padding:"0.3rem 1rem",borderRadius:20,fontSize:"0.85rem",fontWeight:500,
              ...(clocked?{background:"rgba(40,205,65,0.1)",border:"1px solid rgba(40,205,65,0.28)",color:C.greenText}:{background:"#f5f5f7",border:"1px solid #e8e8ed",color:C.sub})}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:clocked?C.green:"#a1a1a6"}}></span>
              {clocked?"Currently Clocked In":"Not Clocked In"}
            </div>
          </div>
          <div style={{fontSize:"0.95rem",color:C.sub,marginBottom:"1.4rem",fontWeight:500}}>
            Enter PIN to clock <strong style={{color:clocked?C.red:C.greenText}}>{clocked?"out":"in"}</strong>
          </div>
          <div style={{display:"flex",gap:"1.1rem",justifyContent:"center",marginBottom:"0.8rem"}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{width:18,height:18,borderRadius:"50%",background:i<pin.length?C.text:"#e8e8ed",transition:"background 0.12s"}}/>
            ))}
          </div>
          <div style={{minHeight:"1.8rem",marginBottom:"0.4rem"}}>
            {error&&<p style={{color:C.red,fontSize:"0.88rem",margin:0}}>{error}</p>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.7rem",marginBottom:"1.6rem"}}>
            {KEYS.map((k,i)=>(
              k===""?<div key={i}/>:
              <button key={i} onClick={()=>k==="⌫"?handleDel():handleDigit(k)}
                style={{background:k==="⌫"?"#f5f5f7":"#fff",border:"1px solid #e8e8ed",borderRadius:16,
                  padding:"1.2rem 0",fontSize:k==="⌫"?"1.4rem":"1.55rem",fontWeight:k==="⌫"?400:500,
                  color:C.text,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
                  boxShadow:"0 2px 8px rgba(0,0,0,0.06)",lineHeight:1,minHeight:64}}>
                {k}
              </button>
            ))}
          </div>
          <button onClick={handleBack} style={{background:"none",border:"none",color:C.muted,fontSize:"0.95rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",padding:"0.5rem 1rem"}}>
            ← Back to staff list
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={{height:"100vh",background:"#f0f0f5",display:"flex",flexDirection:"column",fontFamily:"'DM Sans',sans-serif",overflow:"hidden"}}>
      {showKioskSelfie&&(
        <SelfieCapture
          userName={showKioskSelfie.name}
          onCapture={(blob)=>{
            const u=showKioskSelfie;
            setShowKioskSelfie(null);
            onKioskClock(u.userId,u.name,"in",blob);
            setConfirmed({type:"in",name:u.name});
            setTimeout(()=>setConfirmed(null),2500);
          }}
          onSkip={()=>{
            const u=showKioskSelfie;
            setShowKioskSelfie(null);
            onKioskClock(u.userId,u.name,"in",null);
            setConfirmed({type:"in",name:u.name});
            setTimeout(()=>setConfirmed(null),2500);
          }}
        />
      )}
      {showAdminModal&&(
        <AdminLoginModal
          users={users}
          onLogin={(u)=>{setShowAdminModal(false);onAdminLogin(u);}}
          onClose={()=>setShowAdminModal(false)}
        />
      )}

      {/* Header */}
      <div style={{background:C.blue,padding:"0.9rem 1.8rem",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <div style={{color:"#fff",fontSize:"1.25rem",fontWeight:600,letterSpacing:"0.01em"}}>Ocean Island Inn</div>
          <div style={{color:"rgba(255,255,255,0.7)",fontSize:"0.78rem",marginTop:"0.1rem"}}>{dateStr}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"1.5rem"}}>
          <div style={{textAlign:"right"}}>
            <div style={{color:"#fff",fontSize:"2rem",fontWeight:300,lineHeight:1,letterSpacing:"-0.02em"}}>{timeStr}</div>
            <div style={{color:"rgba(255,255,255,0.65)",fontSize:"0.72rem",marginTop:"0.1rem"}}><span style={{fontWeight:600,color:"rgba(255,255,255,0.9)"}}>{clockedInCount}</span> of {staffUsers.length} staff in</div>
          </div>
        </div>
      </div>

      {/* Sub-header */}
      <div style={{background:"#fff",borderBottom:"1px solid #e8e8ed",padding:"0.6rem 1.8rem",display:"flex",alignItems:"center",flexShrink:0}}>
        <span style={{color:C.sub,fontSize:"0.88rem",fontWeight:500}}>Tap your name, then enter your PIN</span>
      </div>

      {/* Main area — staff grid + alphabet sidebar */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto"}}>
          <div ref={gridRef} style={{padding:"0.9rem"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:"0.75rem"}}>
              {filtered.map(u=>{
                const clocked=isClockedIn(u.id);
                return(
                  <button key={u.id} onClick={()=>{setSelected(u);setPin("");setError("");}}
                    style={{background:"#fff",border:`2px solid ${clocked?"rgba(40,205,65,0.45)":"#e8e8ed"}`,borderRadius:20,
                      padding:"1.4rem 0.8rem 1.1rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
                      boxShadow:clocked?"0 3px 16px rgba(40,205,65,0.16)":"0 1px 6px rgba(0,0,0,0.06)",
                      textAlign:"center",transition:"transform 0.1s, box-shadow 0.1s",
                      WebkitTapHighlightColor:"transparent"}}>
                    <div style={{width:52,height:52,borderRadius:"50%",
                      background:clocked?"rgba(40,205,65,0.15)":"#f0f0f5",
                      color:clocked?C.greenText:"#888",
                      fontSize:"1.3rem",fontWeight:700,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      margin:"0 auto 0.65rem",border:clocked?"2px solid rgba(40,205,65,0.35)":"2px solid transparent"}}>
                      {u.name[0]}
                    </div>
                    <div style={{fontSize:"0.95rem",fontWeight:600,color:C.text,lineHeight:1.25,marginBottom:"0.35rem",wordBreak:"break-word"}}>{u.name}</div>
                    <div style={{fontSize:"0.67rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",color:clocked?C.greenText:C.muted}}>
                      {clocked?"● Clocked In":"○ Clocked Out"}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>

        {/* Alphabet sidebar — wider for tablet fingers */}
        <div style={{width:76,background:"#fff",borderLeft:"1px solid #e8e8ed",display:"flex",flexDirection:"column",alignItems:"center",padding:"0.5rem 0",gap:"0.15rem",overflowY:"auto",flexShrink:0}}>
          {letters.map(l=>(
            <button key={l} onClick={()=>setActiveLetter(l)}
              style={{width:54,padding:"0.5rem 0",borderRadius:10,border:"none",cursor:"pointer",
                fontFamily:"'DM Sans',sans-serif",fontSize:l==="ALL"?"0.65rem":"0.95rem",fontWeight:600,
                background:activeLetter===l?C.blue:"transparent",

      <div style={{background:"#fff",borderTop:"1px solid #e8e8ed",padding:"0.55rem 1.8rem",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>

  );

// ── Root App ──────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[users,setUsers]=useState([]);
  const[records,setRecords]=useState([]);
  const[innCoords,setInnCoords]=useState(DEFAULT_INN);
  const[journalEntries,setJournalEntries]=useState([]);
  const[readEntries,setReadEntries]=useState([]);
  const[showKiosk,setShowKiosk]=useState(true);
  const[lid,setLid]=useState("");
  const[lpw,setLpw]=useState("");
  const[lerr,setLerr]=useState("");
  const[loaded,setLoaded]=useState(false);

  useEffect(()=>{
    (async()=>{
      let[us,recs,coords,journal]=await Promise.all([DB.getUsers(),DB.getRecords(),DB.getCoords(),DB.getJournal()]);
      if(!us||us.filter(u=>u.role!=="system").length===0){
        us=SEED_USERS;
        await Promise.all(SEED_USERS.map(u=>DB.upsertUser(u)));
      }
      us=(us||[]).filter(u=>u.role!=="system");
      us=us.filter(u=>!OLD_DEMO_IDS.includes(u.id));
      const storedIds=new Set(us.map(u=>u.id));
      SEED_USERS.forEach(s=>{if(!storedIds.has(s.id))us.push(s);});

      us=us.map(u=>{
        if(u.role==="staff"&&u.pin===undefined)return{...u,pin:"0000"};
        if(u.id==="admin")return{...u,pin:"858525"};
        return u;
      });
      // Force admin PIN in DB every load so it cannot be stale
      await sb.from("users").update({pin:"858525"}).eq("id","admin");
      await Promise.all(us.map(u=>DB.upsertUser(u)));
      console.log("[Load] records from DB:", (recs||[]).length, "first:", JSON.stringify((recs||[])[0]||null));
      setUsers(us);setRecords(recs||[]);setInnCoords(coords||DEFAULT_INN);setJournalEntries(journal||[]);
      setLoaded(true);
    })();
  },[]);

  const handleLogin=()=>{
    setLerr("");
    const u=users.find(x=>x.username===lid.toLowerCase().trim());
    if(!u){setLerr("Username not found.");return;}
    if((u.pin||"0000")!==lpw){setLerr("Incorrect PIN.");return;}
    setReadEntries([]);
    setUser({...u});
  };

  const handleClock=useCallback(async(type,coords,onSite,selfieBlob)=>{
    const dev=await getDeviceInfo();
    const recId=mkId();
    let selfieUrl=null;
    if(selfieBlob){
      selfieUrl=await DB.uploadSelfie(recId, selfieBlob);
    }
    console.log("[Clock] selfieUrl before insert:", selfieUrl);
    const rec={id:recId,userId:user.id,userName:user.name,type,timestamp:new Date().toISOString(),lat:coords?.lat??null,lng:coords?.lng??null,onSite,ip:dev.ip,deviceId:dev.deviceId,deviceType:dev.deviceType,selfieUrl};
    const updated=[...records,rec];setRecords(updated);await DB.insertRecord(rec);
    console.log("[Clock] insert done, selfieUrl was:", rec.selfieUrl);
    if(type==="in") DB.deleteOldSelfies(90).catch(()=>{});
  },[user,records]);

  const handleKioskClock=useCallback(async(userId,userName,type,selfieBlob)=>{
    const dev=await getDeviceInfo();
    const recId=mkId();
    let selfieUrl=null;
    if(selfieBlob) selfieUrl=await DB.uploadSelfie(recId,selfieBlob);
    const rec={id:recId,userId,userName,type,timestamp:new Date().toISOString(),lat:null,lng:null,onSite:true,ip:dev.ip,deviceId:dev.deviceId,deviceType:dev.deviceType,selfieUrl};
    const updated=[...records,rec];setRecords(updated);await DB.insertRecord(rec);
    if(type==="in") DB.deleteOldSelfies(90).catch(()=>{});
  },[records]);

  const handleSaveCoords=useCallback(async(coords)=>{setInnCoords(coords);await DB.setCoords(coords);},[]);
  const handleAddUser=useCallback(async(u)=>{
    const up=[...users,u];setUsers(up);
    await DB.upsertUser(u);
  },[users]);
  const handleDeleteUser=useCallback(async(id)=>{
    const up=users.filter(u=>u.id!==id);setUsers(up);
    await DB.deleteUser(id);
  },[users]);
  const handleUpdateUser=useCallback(async(id,changes)=>{
    const up=users.map(u=>u.id===id?{...u,...changes}:u);
    setUsers(up);await DB.upsertUser({...users.find(u=>u.id===id),...changes,id});
    if(user?.id===id)setUser(u=>({...u,...changes}));
  },[users,user]);
  const handleAddEntry=useCallback(async(e)=>{const up=[...journalEntries,e];setJournalEntries(up);await DB.insertJournal(e);},[journalEntries]);
  const handleDeleteEntry=useCallback(async(id)=>{const up=journalEntries.filter(e=>e.id!==id);setJournalEntries(up);await DB.deleteJournal(id);},[journalEntries]);
  const handleRead=useCallback((id)=>setReadEntries(p=>[...p,id]),[]);

  const FONTS=`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');`;

  useEffect(()=>{
    if(!user && !showKiosk){
      document.body.classList.add('login-screen');
    } else {
      document.body.classList.remove('login-screen');
    }
    return ()=>document.body.classList.remove('login-screen');
  },[user, showKiosk]);

  if(!loaded)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif",color:C.sub}}>
      <style>{FONTS}</style>Loading…
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif"}}>
      <style>{FONTS}</style>
      {showKiosk?(
        <KioskView
          users={users}
          records={records}
          onKioskClock={handleKioskClock}
          onAdminLogin={(u)=>{setUser(u);setShowKiosk(false);}}
        />
      ):!user?(
        // Fallback login screen (shouldn't normally be reached)
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"2rem",paddingTop:"clamp(2rem, 12vh, 5rem)"}}>
          <div style={{background:"#fff",border:"1px solid #e8e8ed",borderRadius:24,padding:"2.8rem 2.4rem",width:"100%",maxWidth:385,boxShadow:"0 4px 32px rgba(0,0,0,0.08)"}}>
            <div style={{textAlign:"center",marginBottom:"2rem"}}>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"1.75rem",fontWeight:400,color:C.text,letterSpacing:"0.02em",lineHeight:1.2}}>Ocean Island Inn</div>
              <p style={{color:C.muted,fontSize:"0.74rem",letterSpacing:"0.08em",textTransform:"uppercase",margin:"0.3rem 0 0"}}>Staff Time Clock</p>
            </div>
            <label style={{...lbl,marginTop:0}}>Username</label>
            <input style={inp()} type="text" placeholder="Enter username" autoCapitalize="none" autoCorrect="off" value={lid} onChange={e=>setLid(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
            <label style={lbl}>PIN</label>
            <input style={inp({fontFamily:"monospace",letterSpacing:"0.2em",fontSize:"1.1rem"})} type="password" inputMode="numeric" pattern="[0-9]*" maxLength={6} placeholder="••••" value={lpw} onChange={e=>setLpw(e.target.value.replace(/\D/g,"").slice(0,6))} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
            {lerr&&<p style={{color:C.red,fontSize:"0.8rem",textAlign:"center",marginTop:"0.65rem"}}>{lerr}</p>}
            <button style={{...btnPrimary,width:"100%",padding:"0.82rem",marginTop:"1.4rem",fontSize:"0.95rem"}} onClick={handleLogin}>Sign In</button>
            <div style={{marginTop:"1.2rem",borderTop:"1px solid #e8e8ed",paddingTop:"1rem",textAlign:"center"}}>
              <button onClick={()=>setShowKiosk(true)} style={{background:"none",border:"none",color:C.blue,fontSize:"0.82rem",fontWeight:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                ← Back to Kiosk
              </button>
            </div>
          </div>
          <Footer/>
        </div>
      ):(
        <>
          <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0.65rem 1.5rem",borderBottom:"1px solid #e8e8ed",background:"rgba(255,255,255,0.9)",backdropFilter:"blur(18px)",position:"sticky",top:0,zIndex:10}}>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"1.05rem",fontWeight:400,color:C.text,letterSpacing:"0.02em"}}>Ocean Island Inn</div>
            <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
              <span style={{color:C.text,fontSize:"0.84rem",fontWeight:500}}>
                {user.name}
                {user.role==="admin"&&<span style={{background:C.blue,color:"#fff",fontSize:"0.6rem",fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",padding:"0.16rem 0.48rem",borderRadius:20,marginLeft:"0.4rem"}}>Admin</span>}
              </span>
              <button style={btnGhost} onClick={()=>{setUser(null);setShowKiosk(true);}}>← Kiosk</button>
            </div>
          </header>
          {user.role==="admin"
            ?<AdminView users={users} records={records} innCoords={innCoords} onSaveCoords={handleSaveCoords} onAddUser={handleAddUser} onDeleteUser={handleDeleteUser} onUpdateUser={handleUpdateUser} journalEntries={journalEntries} onAddEntry={handleAddEntry} onDeleteEntry={handleDeleteEntry} currentUser={user}/>
            :<StaffView user={user} records={records} onClock={handleClock} innCoords={innCoords} journalEntries={journalEntries} readEntries={readEntries} onRead={handleRead}/>
          }
          <Footer/>
        </>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
