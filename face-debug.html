<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Face Engine Debug</title>
  <style>
    body { font-family: monospace; padding: 1rem; background: #111; color: #0f0; max-width: 600px; margin: 0 auto; }
    video { width: 100%; border-radius: 8px; margin: 0.5rem 0; border: 2px solid #0f0; }
    button { background: #0f0; color: #111; border: none; padding: 0.6rem 1.2rem; font-size: 1rem; font-family: monospace; border-radius: 6px; cursor: pointer; margin: 0.3rem; }
    #log { background: #000; border: 1px solid #333; border-radius: 6px; padding: 0.75rem; min-height: 200px; max-height: 400px; overflow-y: auto; font-size: 0.78rem; line-height: 1.7; }
    .ok { color: #0f0; } .err { color: #f44; } .warn { color: #fa0; } .info { color: #4af; }
  </style>
</head>
<body>
  <h2 style="color:#0f0;margin:0 0 0.5rem">🔬 Face Engine Debug</h2>
  <video id="vid" autoplay muted playsinline></video>
  <div>
    <button onclick="runTest()">▶ Run Full Test</button>
    <button onclick="testBlaze()">BlazeFace Only</button>
    <button onclick="clearLog()">Clear</button>
  </div>
  <div id="log"><span class="info">Press "Run Full Test" to begin.</span></div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.js"></script>
  <script>
    const logEl = document.getElementById('log');
    const vid = document.getElementById('vid');

    function log(msg, cls='ok') {
      const t = new Date().toLocaleTimeString();
      logEl.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }
    function clearLog() { logEl.innerHTML = ''; }

    async function runTest() {
      clearLog();
      log('=== FULL FACE ENGINE TEST ===', 'info');

      // 1. TF backend
      log('Step 1: Setting WebGL backend...', 'info');
      try {
        await tf.setBackend('webgl');
        await tf.ready();
        log(`✓ TF backend: ${tf.getBackend()}`, 'ok');
      } catch(e) {
        log(`✗ TF backend failed: ${e.message}`, 'err');
        log('Trying CPU fallback...', 'warn');
        try {
          await tf.setBackend('cpu');
          await tf.ready();
          log(`✓ CPU backend active (slower)`, 'warn');
        } catch(e2) {
          log(`✗ CPU also failed: ${e2.message}`, 'err');
          return;
        }
      }

      // 2. Load BlazeFace
      log('Step 2: Loading BlazeFace...', 'info');
      let blazeModel;
      try {
        blazeModel = await blazeface.load();
        log('✓ BlazeFace loaded', 'ok');
      } catch(e) {
        log(`✗ BlazeFace load failed: ${e.message}`, 'err');
        return;
      }

      // 3. Load MobileNet
      log('Step 3: Loading MobileNet...', 'info');
      let mobileModel;
      try {
        mobileModel = await mobilenet.load({version:2, alpha:0.5});
        log('✓ MobileNet loaded', 'ok');
      } catch(e) {
        log(`✗ MobileNet load failed: ${e.message}`, 'err');
        return;
      }

      // 4. Camera
      log('Step 4: Starting camera...', 'info');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
        vid.srcObject = stream;
        await vid.play().catch(()=>{});
        await new Promise(resolve => {
          const check = () => {
            if(vid.readyState >= 2 && vid.videoWidth > 0) resolve();
            else requestAnimationFrame(check);
          };
          check();
        });
        log(`✓ Camera active: ${vid.videoWidth}x${vid.videoHeight}`, 'ok');
      } catch(e) {
        log(`✗ Camera failed: ${e.name} - ${e.message}`, 'err');
        return;
      }

      // 5. BlazeFace detection
      log('Step 5: Running BlazeFace detection (5 attempts)...', 'info');
      let detected = false;
      for(let i = 0; i < 5; i++) {
        await new Promise(r => setTimeout(r, 500));
        try {
          const preds = await blazeModel.estimateFaces(vid, false);
          log(`  Attempt ${i+1}: ${preds.length} face(s) detected`, preds.length > 0 ? 'ok' : 'warn');
          if(preds.length > 0) {
            detected = true;
            const p = preds[0];
            log(`  → topLeft: [${p.topLeft.map(v=>v.toFixed(0))}]`, 'ok');
            log(`  → bottomRight: [${p.bottomRight.map(v=>v.toFixed(0))}]`, 'ok');
            log(`  → probability: ${(p.probability * 100).toFixed(1)}%`, 'ok');
          }
        } catch(e) {
          log(`  Attempt ${i+1} ERROR: ${e.message}`, 'err');
        }
      }

      if(!detected) {
        log('⚠ BlazeFace found no faces in 5 attempts.', 'warn');
        log('  → Try: better lighting, face closer to camera, no glasses', 'warn');
      }

      // 6. MobileNet embedding
      if(detected) {
        log('Step 6: Testing MobileNet embedding...', 'info');
        try {
          const preds = await blazeModel.estimateFaces(vid, false);
          const p = preds[0];
          const [x1,y1] = p.topLeft;
          const [x2,y2] = p.bottomRight;
          const pad = 20;
          const sx = Math.max(0, x1-pad), sy = Math.max(0, y1-pad);
          const sw = Math.min(vid.videoWidth, x2+pad) - sx;
          const sh = Math.min(vid.videoHeight, y2+pad) - sy;
          log(`  Crop region: x=${sx.toFixed(0)} y=${sy.toFixed(0)} w=${sw.toFixed(0)} h=${sh.toFixed(0)}`, 'info');

          const crop = document.createElement('canvas');
          crop.width = 224; crop.height = 224;
          crop.getContext('2d').drawImage(vid, sx, sy, sw, sh, 0, 0, 224, 224);

          const embedding = tf.tidy(() => {
            const img = tf.browser.fromPixels(crop).toFloat().div(127.5).sub(1).expandDims(0);
            const {result} = mobileModel.infer(img, true);
            return result.squeeze();
          });
          const vec = await embedding.data();
          embedding.dispose();
          log(`✓ Embedding generated: ${vec.length} dimensions`, 'ok');
          log(`  → sample values: [${Array.from(vec).slice(0,5).map(v=>v.toFixed(4))}...]`, 'ok');
        } catch(e) {
          log(`✗ MobileNet embedding failed: ${e.message}`, 'err');
          log(`  Stack: ${e.stack}`, 'err');
        }
      }

      log('=== TEST COMPLETE ===', 'info');
    }

    async function testBlaze() {
      clearLog();
      log('=== BLAZEFACE QUICK TEST ===', 'info');
      if(!vid.srcObject) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
          vid.srcObject = stream;
          await vid.play().catch(()=>{});
          await new Promise(r => setTimeout(r, 1000));
        } catch(e) { log(`Camera error: ${e.message}`, 'err'); return; }
      }
      try {
        await tf.setBackend('webgl');
        await tf.ready();
        const model = await blazeface.load();
        log(`Camera: ${vid.videoWidth}x${vid.videoHeight}, readyState: ${vid.readyState}`, 'info');
        for(let i=0; i<10; i++) {
          await new Promise(r=>setTimeout(r,400));
          const preds = await model.estimateFaces(vid, false);
          log(`Try ${i+1}: ${preds.length} face(s)${preds.length ? ' prob=' + (preds[0].probability*100).toFixed(1)+'%' : ''}`, preds.length ? 'ok' : 'warn');
        }
      } catch(e) { log(`Error: ${e.message}`, 'err'); }
    }
  </script>
</body>
</html>
